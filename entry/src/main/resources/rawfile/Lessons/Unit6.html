  <h1>第六单元总结</h1>
  <p>第六单元的学习结束了，我们来一起回顾一下学习了哪些内容吧。</p>
  <p>以下内容中被标注为<diy style="color: #e5aa5a;font-weight: 600">高亮</diy>的内容，是编者认为大家应该在这一单元彻底掌握的内容，后面的课程中即使再遇到了也不会进行引用，这部分请格外认真复习。</p>
  <hr>
  <!-- <p style="background:#e4e4e4;">语法：</p> -->
  <div grammar="grammar21-01" onclick="grammarClick(this);">
    <span class="hltooltip"> 动词た形</span>
  </div>
  <div grammar="grammar21-02" onclick="grammarClick(this);">
    <span class="hltooltip">[动た形] ことが　あります</span>
  </div>
  <div grammar="grammar21-03" onclick="grammarClick(this);">
    <span>[动た形] 後で，～</span>
  </div>
  <div grammar="grammar21-04" onclick="grammarClick(this);">
      <span>动 ましょうか</span>
  </div>
  <div grammar="grammar22-01" onclick="grammarClick(this);">
    <span>敬体形・简体形</span>
  </div>
  <div grammar="grammar22-02" onclick="grammarClick(this);">
    <span>句けど　句</span><br><br>
    <span>ーーーー与'句 が 句'的用法完全相同。</span>
  </div>
  <div grammar="grammar23-01" onclick="grammarClick(this);">
    <span>〜たり　〜たり</span>
  </div>
  <div grammar="grammar23-02" onclick="grammarClick(this);">
    <span class="hltooltip">[句简体形]か　どうか</span>
  </div>
  <div grammar="grammar23-03" onclick="grammarClick(this);">
      <span>〜に　よって</span>
  </div>
  <div grammar="grammar24-01" onclick="grammarClick(this);">
    <span class="hltooltip">[句简体]と　思います</span>
  </div>
  <div grammar="grammar24-02" onclick="grammarClick(this);">
    <span class="hltooltip">名[人]は　名[人]に　[句简体]と　言いました</span>
  </div>
  <div grammar="grammar24-03" onclick="grammarClick(this);">
    <span>[简体]＋の・ん　です</span>
  </div>
  <div grammar="grammar24-04" onclick="grammarClick(this);">
      <span>〜に　ついて</span>
  </div>
  <hr>
