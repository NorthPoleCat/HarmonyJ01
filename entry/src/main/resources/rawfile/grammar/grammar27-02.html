  <h1>[动ます形去掉ます]＋ながら</h1>
  <h2>释义：<span style="color: #e5aa5a;font-weight: 600">～边～</span></h2><a style="font-size:2em" href="../Lessons/Lesson27.html">首次出现于初级下，27课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>李<rt>り</rt></ruby>さんはテレビを<ruby>見<rt>み</rt></ruby>ながら<ruby>食<rt>しょく</rt></ruby><ruby>事<rt>じ</rt></ruby>をしています。</p>
  <p id="ch">小李边看电视边吃饭。</p>
  <hr>
  <p>そのことを<ruby>考<rt>かんが</rt></ruby>えながら<ruby>歩<rt>ある</rt></ruby>いていました。</p>
  <p id="ch">一边考虑着那件事一边走着。</p>
