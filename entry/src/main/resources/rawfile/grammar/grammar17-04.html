  <h1>疑问词　＋　でも</h1>
  <h2>表示在任何情况下都相同。</h2><a style="font-size: 2em" href="../Lessons/Lesson17.html">首次出现于初级上，17课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>李<rt>り</rt></ruby>さんは　<ruby>何<rt>なに</rt></ruby>を　<ruby>食<rt>た</rt></ruby>べたいですか。(小李你想吃什么?)</p>
  <p>ーーーー<ruby>何<rt>なん</rt></ruby>でも　いいです。（什么都行。）</p>
  <p>いつでも　<ruby>電<rt>でん</rt></ruby><ruby>話<rt>わ</rt></ruby>を　して　ください。（请你随时打电话。）</p>
  <p>だれでも　<ruby>分<rt>わ</rt></ruby>かります。（谁都明白。）</p>
