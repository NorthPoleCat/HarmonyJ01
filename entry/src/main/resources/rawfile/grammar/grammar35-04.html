  <h1>名　しか＋否定形式</h1>
  <h2>释义：表示全部。</h2><a style="font-size:2em" href="../Lessons/Lesson35.html">首次出现于初级下，35课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>会<rt>かい</rt></ruby><ruby>議<rt>ぎ</rt></ruby><ruby>室<rt>しつ</rt></ruby>には<ruby>李<rt>り</rt></ruby>さんしかいません。</p>
  <p id="ch">会议室里只有小李一个人。</p>
  <hr>
  <p>わたしは<ruby>水<rt>みず</rt></ruby>しか<ruby>飲<rt>の</rt></ruby>みません。</p>
  <p id="ch">我只喝水。</p>
  <hr>
  <p><ruby>安全<rt>あんぜん</rt></ruby>な<ruby>所<rt>ところ</rt></ruby>はここしかありません。</p>
  <p id="ch">安全的地方只有这里。</p>
