<body>
  <h1>名[人]に　会います</h1>
  <h2>释义："会います"相当于汉语中的"见"。所见对象用助词"に"修饰。</h2><a style="font-size: 2em" href="../Lessons/Lesson08.html">首次出现于初级上，08课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>李<rt>り</rt></ruby>さんは　<ruby>長島<rt>ながしま</rt></ruby>さんに　<ruby>会<rt>あ</rt></ruby>います。</p>
  <p id="ch">小李明天见长岛先生。</p>
  <hr>
  <p>わたしは　<ruby>駅<rt>えき</rt></ruby>で　<ruby>森<rt>もり</rt></ruby>さんに　<ruby>会<rt>あ</rt></ruby>いました。</p>
  <p id="ch">我在车站遇见了森先生。</p>
  <hr>
</body>
</html>
