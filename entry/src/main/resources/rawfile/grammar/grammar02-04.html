<body>
  <h1>どれ/どの 名</h1>
  <h2>释义：<span style="color: #e5aa5a">哪个？</span></h2><a style="font-size:2em" href="../Lessons/Lesson02.html">首次出现于初级上，02课</a>
  <p><span style="color: #e5aa5a;font-weight: 600">备注：</span>"どれ/どの"是在三个以上的选项中选择时使用的疑问词。"どの"用来修饰名词。</p>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>森<rt>もり</rt></ruby>さんの　かばんは　どれ　ですか。</p>
  <p id="ch">森先生的包是哪个？</p>
  <hr>
  <p><ruby>長島<rt>ながしま</rt></ruby>さんの　<ruby>傘<rt>かさ</rt></ruby>は　どれ　ですか。</p>
  <p id="ch">长岛先生的伞是哪一把？</p>
  <hr>
  <p><ruby>小野<rt>おの</rt></ruby>さんの　<ruby>机<rt>つくえ</rt></ruby>は　どの<ruby>机<rt>つくえ</rt></ruby>　ですか。</p>
  <p id="ch">小野女士的桌子是哪一张？</p>
  <hr>
</body>
</html>
