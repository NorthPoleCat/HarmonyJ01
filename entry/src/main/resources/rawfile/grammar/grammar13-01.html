  <h1>名[时间]に　名[次数] ＋　动</h1>
  <h2>在一定时间内进行若干次动作时使用的句型。</h2><a style="font-size: 2em" href="../Lessons/Lesson13.html">首次出现于初级上，13课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>李<rt>り</rt></ruby>さんは　<ruby>一<rt>いっ</rt></ruby><ruby>週<rt>しゅう</rt></ruby><ruby>間<rt>かん</rt></ruby>に　<ruby>２<rt>に</rt></ruby><ruby>回<rt>かい</rt></ruby>　プールへ　<ruby>行<rt>い</rt></ruby>きます。</p>
  <p id="ch">小李一周去游泳池游两次泳。</p>
  <hr>
  <p>この　<ruby>花<rt>はな</rt></ruby>は　<ruby>２<rt>に</rt></ruby><ruby>年<rt>ねん</rt></ruby>に　<ruby>１<rt>いち</rt></ruby><ruby>度<rt>ど</rt></ruby>　<ruby>咲<rt>さ</rt></ruby>きます。</p>
  <p id="ch">这种花每两年开一次。</p>
  <hr>
