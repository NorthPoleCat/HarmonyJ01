  <h1>[名/小句]とか [名/小句]とか</h1>
  <h2>释义：用于列举同样性质的几个例子。</h2><a style="font-size:2em" href="../Lessons/Lesson37.html">首次出现于初级下，37课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p>パーティーで，<ruby>戴<rt>たい</rt></ruby>さんとか<ruby>楊<rt>よう</rt></ruby>さんとか，いろいろな<ruby>人<rt>ひと</rt></ruby>に<ruby>会<rt>あ</rt></ruby>いました。</p>
  <p id="ch">联欢会上，碰到了小戴、小杨等许多人。</p>
  <hr>
  <p>コートとか<ruby>靴<rt>くつ</rt></ruby>とか，たくさん<ruby>買<rt>か</rt></ruby>いました。</p>
  <p id="ch">买了外套、鞋子等好多东西。</p>
  <hr>
  <p><ruby>海外旅行<rt>かいがいりょこう</rt></ruby>に<ruby>行<rt>い</rt></ruby>きたいとか，<ruby>新<rt>あたら</rt></ruby>しい<ruby>車<rt>くるま</rt></ruby>が<ruby>欲<rt>ほ</rt></ruby>しいとか，ぜいたくなことばかり<ruby>言<rt>い</rt></ruby>っています。</p>
  <p id="ch">想去海外旅行啦，想要新车啦，尽说些奢望。</p>
  <hr>
