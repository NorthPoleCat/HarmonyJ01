<body>
  <h1>动[ます形去掉ます]　やすいです・にくいです</h1>
  <h2>释义：表示事物的某种性质。<span style="color: #e5aa5a;">'～やすいです'</span>表示事物有<span style="color: #e5aa5a;">'易于～'</span>的倾向，<span style="color: #e5aa5a;">'～にくいです'</span>表示事物有<span style="color: #e5aa5a;">'难于～'</span>的倾向。</h2><a style="font-size: 2em" href="../Lessons/Lesson43.html">首次出现于初级上，43课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p>このボールぺんはとても<ruby>書<rt>か</rt></ruby>きやすいです。</p>
  <p id="ch">这支圆珠笔很好用。</p>
  <hr>
  <p>この<ruby>本<rt>ほん</rt></ruby>は<ruby>読<rt>よ</rt></ruby>みやすいです。</p>
  <p id="ch">这本书很好理解。</p>
  <hr>
  <p>この<ruby>店<rt>みせ</rt></ruby>の<ruby>場<rt>ば</rt></ruby><ruby>所<rt>しょ</rt></ruby>は<ruby>分<rt>わ</rt></ruby>かりにくかったです。</p>
  <p id="ch">这个商店的地址很难找。</p>
  <hr>
  <p><ruby>運動<rt>うんどう</rt></ruby>をしている<ruby>人<rt>ひと</rt></ruby>は<ruby>太<rt>ふと</rt></ruby>りにくいです。</p>
  <p id="ch">经常做运动的人不容易发胖。</p>
  <hr>
</body>
</html>
