<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" type="text/css" href="../StaticFiles/Grammar.css">
  <script type="text/javascript" src="../StaticFiles/Lession.js"></script>

<body>
  <h1>[动ない]で　ください</h1>
  <h2>释义：表示否定的命令时使用。<span style="color: #e5aa5a">"请别…；请不要…"</span></h2><a style="font-size: 2em" href="../Lessons/Lesson19.html">首次出现于初级上，19课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>部屋<rt>へや</rt></ruby>の　かぎを　<ruby>忘<rt>わす</rt></ruby>れないで　ください。</p>
  <p id="ch">请别忘了房间钥匙。</p>
  <hr>
  <p>この　<ruby>部屋<rt>へや</rt></ruby>には　<ruby>入<rt>はい</rt></ruby>らないで　ください。</p>
  <p id="ch">请不要进入这个房间。</p>
  <hr>
  <p><ruby>無理<rt>むり</rt></ruby>を　しないで　ください。</p>
  <p id="ch">请不要勉强。</p>
  <hr>
  <h2 style="color: #e5aa5a;">相似句型：</h2>
  <h3 class="tooltip" grammar="grammar07-03" onclick="grammarClick(this);">名を　ください</h3><br>
  <h3 class="tooltip" grammar="grammar14-04" onclick="grammarClick(this);">动[て] ください</h3>
</body>
</html>
