<body>
  <h1>动[て]は　いけません</h1>
  <h2>表示禁止。</h2><a style="font-size: 2em" href="../Lessons/Lesson15.html">首次出现于初级上，15课</a>
  <p><span style="color: #e5aa5a;font-weight: 600">备注：</span>对长辈一般使用"〜ないで　ください"</p>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>飛<rt>ひ</rt></ruby><ruby>行<rt>こう</rt></ruby><ruby>機<rt>き</rt></ruby>の　<ruby>中<rt>なか</rt></ruby>で　タバコを　<ruby>吸<rt>す</rt></ruby>っては　いけません。</p>
  <p id="ch">飞机上不能吸烟。</p>
  <hr>
  <p><ruby>教<rt>きょう</rt></ruby><ruby>室<rt>しつ</rt></ruby>で　<ruby>物<rt>もの</rt></ruby>を　<ruby>食<rt>た</rt></ruby>べては　いけません。</p>
  <p id="ch">教室里不能吃东西。</p>
  <hr>
  <p>この<ruby>部屋<rt>へや</rt></ruby>に　<ruby>入<rt>はい</rt></ruby>っては　いけませんか。</p>
  <p id="ch">不能进这个屋子吗？</p>
  <p>ーーーーはい，<ruby>入<rt>はい</rt></ruby>っては　いけません。</p>
  <p id="ch">ーーーー是的，不能。</p>
  <p>ーーーーいいえ，<ruby>入<rt>はい</rt></ruby>っても　いいです。</p>
  <p id="ch">ーーーー不，可以进。</p>
  <hr>
</body>
