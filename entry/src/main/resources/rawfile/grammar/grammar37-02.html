<body>
  <h1>小句ば，小句</h1>
  <h2>释义：小句2的成立必须以小句1的成立为条件。表假定。</h2><a style="font-size:2em" href="../Lessons/Lesson37.html">首次出现于初级下，37课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p>この<ruby>大会<rt>たいかい</rt></ruby>で　<ruby>優<rt>ゆう</rt></ruby><ruby>勝<rt>しょう</rt></ruby>すれば，オリンピックに<ruby>出<rt>しゅつ</rt></ruby><ruby>場<rt>じょう</rt></ruby>することができます。</p>
  <p id="ch">如果在这次大会上获胜，就能够参加奥运会。</p>
  <hr>
  <p><ruby>李<rt>り</rt></ruby>さんに<ruby>聞<rt>き</rt></ruby>けば，<ruby>分<rt>わ</rt></ruby>かりますよ。</p>
  <p id="ch">问小李就知道了。</p>
  <hr>
  <p><ruby>部屋<rt>へや</rt></ruby>がもう<ruby>少<rt>すこ</rt></ruby>し　<ruby>広<rt>ひろ</rt></ruby>ければ，いいのですが。</p>
  <p id="ch">房间要是再大一点就好了。</p>
  <hr>
  <p><ruby>雨<rt>あめ</rt></ruby>が　<ruby>降<rt>ふ</rt></ruby>らなければ，ハイキングに<ruby>行<rt>い</rt></ruby>きましょう。</p>
  <p id="ch">要是不下雨的话，就去郊游吧。</p>
  <hr>
