<body>
  <h1>形容词て形</h1>
  <h2 style="background:#e4e4e4;">变形规律：</h2>
  <p><span style="font-weight: 600">一类形容词词</span>：<span style="color: #e5aa5a;font-weight: 600">将词尾的い变为くて</span></p>
  <p>例：明るいー>明るくて　新しいー>新しくて</p>
  <hr>
  <p><span style="font-weight: 600">二类形容词</span>：<span style="color: #e5aa5a;font-weight: 600">词尾＋で</span></p>
  <p>例：簡単ー>簡単で　親切ー>親切で</p>
  <hr>
  <h2 style="background:#e4e4e4;">涉及语法：</h2>
  <p class="tooltip" grammar="grammar16-02" onclick="grammarClick(this);">形[て] 形</p><br>
</body>
</html>
