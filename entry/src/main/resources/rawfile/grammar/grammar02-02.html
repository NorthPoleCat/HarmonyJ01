<body>
  <h1>だれですか/何ですか</h1>
  <h2>释义：<span style="color: #e5aa5a">谁？/什么？</span></h2><a style="font-size:2em" href="../Lessons/Lesson02.html">首次出现于初级上，02课</a>
  <p><span style="color: #e5aa5a;font-weight: 600">备注1：</span>询问人的时候使用"だれ",询问事物的时候使用"何"。"だれ"的礼貌说法是"どなた"。</p>
  <p><span style="color: #e5aa5a;font-weight: 600">备注2：</span>"だれ"的汉字是"誰"。</p>
  <p style="background:#e4e4e4;">例句：</p>
  <p>それは　<ruby>何<rt>なん</rt></ruby>ですか。</p>
  <p id="ch">那是什么？</p>
  <hr>
  <p>あの<ruby>人<rt>ひと</rt></ruby>は　だれですか。</p>
  <p id="ch">那个人是谁？</p>
  <hr>
  <p>スミスさんは　どなたですか。</p>
  <p id="ch">史密斯先生是哪一位？</p>
  <hr>
</body>
</html>
