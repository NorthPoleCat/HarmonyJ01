  <h1>名は　名ほど　一类形【否定】/二类形【否定】</h1>
  <h2>释义：<span style="color: #e5aa5a">～不如～那么～</span></h2><a style="font-size: 2em" href="../Lessons/Lesson12.html">首次出现于初级上，12课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>東<rt>とう</rt></ruby><ruby>京<rt>きょう</rt></ruby>の　<ruby>冬<rt>ふゆ</rt></ruby>は　<ruby>北<rt>ぺ</rt></ruby><ruby>京<rt>キン</rt></ruby>の　<ruby>冬<rt>ふゆ</rt></ruby>ほど　<ruby>寒<rt>さむ</rt></ruby>く　ないです。</p>
  <p id="ch">东京的冬天没有北京的冬天那么冷。</p>
  <hr>
  <p><ruby>神<rt>こう</rt></ruby><ruby>戸<rt>べ</rt></ruby>は　<ruby>大阪<rt>おおさか</rt></ruby>ほど　にぎやか　では ありません。</p>
  <p id="ch">神户没有大阪那么繁华。</p>
  <hr>
  <p>わたしの　<ruby>部屋<rt>へや</rt></ruby>は　<ruby>王<rt>おう</rt></ruby>さんの　<ruby>部屋<rt>へや</rt></ruby>ほど　きれい　では　ありません。</p>
  <p id="ch">我的房间没有小王的房间那么整洁。</p>
  <hr>
