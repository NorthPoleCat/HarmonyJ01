<body>
  <h1>名は名では　ありません</h1>
  <h2>释义：<span style="color: #e5aa5a">～不是～</span></h2><a style="font-size:2em" href="../Lessons/Lesson01.html">首次出现于初级上，01课</a>
  <p><span style="color: #e5aa5a;font-weight: 600">备注：</span><span style="color: #e5aa5a;font-weight: 600">"では"</span>在口语中有时会发成<span style="color: #e5aa5a;font-weight: 600">"じゃ"</span>。</p>
  <p style="background:#e4e4e4">例句：</p>
  <p><ruby>森<rt>もり</rt></ruby>さん　は　<ruby>学生<rt>がくせい</rt></ruby>では　ありません。</p>
  <p id="ch">森先生不是学生。</p>
  <hr>
  <p>わたし　は　<ruby>日<rt>に</rt></ruby><ruby>本人<rt>ほんじん</rt></ruby>では　ありません。</p>
  <p id="ch">我不是日本人。</p>
  <hr>
  <p>わたし　は　<ruby>田<rt>た</rt></ruby><ruby>中<rt>なか</rt></ruby>じや　ありません。</p>
  <p id="ch">我不是田中。</p>
  <hr>
  <br>
  <p style="color: red;font-size: 3em">此句型为高频基础句型，原则上第一课后不再给予标注。</p>
</body>
</html>
