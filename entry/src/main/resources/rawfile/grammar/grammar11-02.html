<body>
  <h1>名は　名が　动【ます】/一类形【です】/二类形【です】</h1>
  <h2>用来<span style="color: #e5aa5a">表示能力</span>的句型（分かります・できます・上手です・下手です・苦手です... ...）。</h2><a style="font-size: 2em" href="../Lessons/Lesson11.html">首次出现于初级上，11课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p>スミスさんは　<ruby>韓<rt>かん</rt></ruby><ruby>国<rt>こく</rt></ruby><ruby>語<rt>ご</rt></ruby>が　<ruby>分<rt>わ</rt></ruby>かります。</p>
  <p id="ch">史密斯先生懂韩语。</p>
  <hr>
  <p>わたしは　コンピュータが　できません。</p>
  <p id="ch">我不会用电脑。</p>
  <hr>
  <p><ruby>小野<rt>おの</rt></ruby>さんは　<ruby>料<rt>りょう</rt></ruby><ruby>理<rt>り</rt></ruby>が　<ruby>上<rt>じょう</rt></ruby><ruby>手<rt>ず</rt></ruby>です。</p>
  <p id="ch">小野女士擅长做饭。</p>
  <hr>
</body>
