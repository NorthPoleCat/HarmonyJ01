<body>
  <h1>动词ない形</h1>
  <h2>变形规律：</h2>
  <p><span style="font-weight: 600">五段动词</span>：将词尾的<span style="color: #e5aa5a;font-weight: 600">う段假名</span>改为对应的<span style="color: #e5aa5a;font-weight: 600">あ段假名</span>后＋ない</p>
  <p><span style="color: #e5aa5a;font-weight: 600">备注：</span>如果最后<span style="color: #e5aa5a;font-weight: 600">以う结尾</span>时，<span style="color: #e5aa5a;font-weight: 600">将う变为わ＋ない</span></p>
  <p>例：買うー>買わない　待つー>待たない　売るー>売らない</p>
  <hr>
  <p><span style="font-weight: 600">一段动词</span>：去掉词尾的る＋ない</p>
  <p>例：食べるー>食べない　見るー>見ない</p>
  <hr>
  <p><span style="font-weight: 600">カ变动词</span>：来るー>こない</p>
  <p><span style="font-weight: 600">サ变动词</span>：するー>しない</p>
  <br>
  <p><span style="color: #e5aa5a;font-weight: 600">备注：</span>动词ない形同时也是动词的<a style="font-size: 1em" href="../grammar/grammar22-01.html">简体否定式</a></p>
  <h2>涉及语法：</h2>
  <p class="tooltip" grammar="grammar19-02" onclick="grammarClick(this);">[动ない]で　ください</p><br>
  <p class="tooltip" grammar="grammar19-03" onclick="grammarClick(this);">[动ない形去掉ない] なければなりません</p><br>
  <p class="tooltip" grammar="grammar19-04" onclick="grammarClick(this);">[动ない形去掉ない] なくても　いいです</p><br>
</body>
</html>
