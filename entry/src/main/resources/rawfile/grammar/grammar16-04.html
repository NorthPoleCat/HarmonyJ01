<body>
  <h1>まだ + 动[否]</h1>
  <h2>表达程度不足。相当于汉语中的<span style="color: #e5aa5a">‘还没’</span>。</h2><a style="font-size: 2em" href="../Lessons/Lesson16.html">首次出现于初级上，16课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>何年<rt>なんねん</rt></ruby>ぐらい　<ruby>日<rt>に</rt></ruby><ruby>本<rt>ほん</rt></ruby><ruby>語<rt>ご</rt></ruby>を　<ruby>勉<rt>べん</rt></ruby><ruby>強<rt>きょう</rt></ruby>しましたか。</p>
  <p id="ch">学了几年日语？</p>
  <p>ーーーー<ruby>２<rt>に</rt></ruby><ruby>年<rt>ねん</rt></ruby>　<ruby>勉<rt>べん</rt></ruby><ruby>強<rt>きょう</rt></ruby>しました。でも，まだ　あまり　できません。</p>
  <p id="ch">ーーーー学了两年，但还不太会。</p>
  <hr>
  <p><ruby>小野<rt>おの</rt></ruby>さんは　もう　<ruby>結婚<rt>けっこん</rt></ruby>していますか。</p>
  <p id="ch">小野女士，你已经结婚了吗？</p>
  <p>ーーーーいいえ，まだ　<ruby>結婚<rt>けっこん</rt></ruby>していません。</p>
  <p id="ch">ーーーー不，还没结。</p>
  <hr>
</body>
