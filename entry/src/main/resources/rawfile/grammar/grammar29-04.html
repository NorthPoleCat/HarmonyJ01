  <p>もうちょっと　<ruby>急<rt>いそ</rt></ruby>いで。</p>

  <hr>
  <p>ちゃんと<ruby>話<rt>はなし</rt></ruby>を　<ruby>聞<rt>き</rt></ruby>いて。</p>
