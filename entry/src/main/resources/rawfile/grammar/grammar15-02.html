<body>
  <h1>动[て]も　いいです</h1>
  <h2>表示许可。</h2><a style="font-size: 2em" href="../Lessons/Lesson15.html">首次出现于初级上，15课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>家<rt>いえ</rt></ruby>で　<ruby>仕<rt>し</rt></ruby><ruby>事<rt>ごと</rt></ruby>を　しても　いいです。</p>
  <p id="ch">在家里工作也可以。</p>
  <hr>
  <p>ここで　<ruby>写真<rt>しゃしん</rt></ruby>を　<ruby>撮<rt>と</rt></ruby>っても　いいですか。</p>
  <p id="ch">这儿可以拍照吗？</p>
  <p>ーーーーいいですよ。</p>
  <p id="ch">ーーーー可以。</p>
  <hr>
  <p><ruby>家<rt>いえ</rt></ruby>に　<ruby>帰<rt>かえ</rt></ruby>っても　いいですか。</p>
  <p id="ch">可以回家吗？</p>
  <p>ーーーーはい，<ruby>帰<rt>かえ</rt></ruby>っても　いいです。</p>
  <p id="ch">ーーーー是的，可以回家。</p>
  <hr>
  <h2 style="color: #e5aa5a;">相似句型：</h2>
  <h3 class="tooltip" grammar="grammar19-04" onclick="grammarClick(this);">[动ない形去掉ない] なくても　いいです</h3><br>
</body>
