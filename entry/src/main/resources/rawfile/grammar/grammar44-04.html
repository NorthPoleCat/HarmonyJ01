<body>
  <h1>～過ぎます</h1>
  <h2>释义：表示某种动作或者事物的性质等超过了正常的量或程度。</h2><a style="font-size: 2em" href="../Lessons/Lesson44.html">首次出现于初级上，44课</a>

  <p style="background:#e4e4e4;">语法形式：</p>
  <p>1.动[ます形去掉ます] 過ぎます</p>
  <p>2.一类形容词[去掉い] 過ぎます</p>
  <p>2.二类形容词 過ぎます</p>

  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>昼<rt>ひる</rt></ruby>ご<ruby>飯<rt>はん</rt></ruby>を<ruby>食<rt>た</rt></ruby>べ<ruby>過<rt>す</rt></ruby>ぎました。</p>
  <p id="ch">午饭吃多了。</p>
  <hr>
  <p>このスープは<ruby>熱<rt>あつ</rt></ruby><ruby>過<rt>す</rt></ruby>ぎませんか。</p>
  <p id="ch">你不觉得这个汤太烫吗？</p>
  <hr>
  <p>この<ruby>説明<rt>せつめい</rt></ruby>は<ruby>複雑<rt>ふくざつ</rt></ruby><ruby>過<rt>す</rt></ruby>ぎます。</p>
  <p id="ch">这说明太复杂。</p>
  <hr>

</body>
