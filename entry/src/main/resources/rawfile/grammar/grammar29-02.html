<body>
  <h1>[动ます形去掉ます]＋なさい</h1>
  <h2>释义：表命令，语气比动词命令形要稍微客气一些。</h2><a style="font-size:2em" href="../Lessons/Lesson29.html">首次出现于初级下，29课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>質問<rt>しつもん</rt></ruby>に<ruby>答<rt>こた</rt></ruby>えなさい。</p>
  <p id="ch">回答问题！</p>
  <hr>
  <p><ruby>早<rt>はや</rt></ruby>くお<ruby>風呂<rt>ふろ</rt></ruby>に<ruby>入<rt>はい</rt></ruby>りなさい。</p>
  <p id="ch">快去洗澡！</p>
  <hr>
</body>
