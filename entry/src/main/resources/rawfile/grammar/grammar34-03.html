  <h1>动[て]　みます</h1>
  <h2>释义：表示尝试做某事。</h2><a style="font-size:2em" href="../Lessons/Lesson34.html">首次出现于初级下，34课</a>
 <!--  <h3 style="color: #e5aa5a;font-weight: 600">编者总结：这个句型写作汉字是'动[て]　見ます'，类似汉语中的"做XXX看看"，"试试看"。</h3> -->
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>太<rt>おお</rt></ruby><ruby>田<rt>た</rt></ruby>さんは　<ruby>中<rt>ちゅう</rt></ruby><ruby>国<rt>ごく</rt></ruby><ruby>語<rt>ご</rt></ruby>で　<ruby>手<rt>て</rt></ruby><ruby>紙<rt>がみ</rt></ruby>を　<ruby>書<rt>か</rt></ruby>いてみました。</p>
  <p id="ch">太田先生试着用汉语写了一封信。</p>
  <hr>
  <p>おいしそうですね。<ruby>食<rt>た</rt></ruby>べてみます</p>
  <p id="ch">看上去很好吃啊，我来尝尝。</p>
  <hr>
  <p>それはおかしい。もう<ruby>一<rt>いち</rt></ruby><ruby>度<rt>ど</rt></ruby>　<ruby>調<rt>しら</rt></ruby>べてみてください</p>
  <p id="ch">真奇怪。你再调查一下。</p>
  <hr>
</body>
