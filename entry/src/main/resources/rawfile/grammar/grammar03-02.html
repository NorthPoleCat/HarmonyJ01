<body>
  <h1>名は　どこですか</h1>
  <h2>释义：<span style="color: #e5aa5a">～在哪</span></h2><a style="font-size:2em" href="../Lessons/Lesson03.html">首次出现于初级上，03课</a>
  <p><span style="color: #e5aa5a;font-weight: 600">备注：</span>"どちら"是"どこ"的礼貌说法。</p>
  <p style="background:#e4e4e4;">例句：</p>
  <p>トイレは　どこですか。</p>
  <p id="ch">厕所在哪？</p>
  <p>あちらです。</p>
  <p id="ch">在那儿。</p>
  <hr>
  <p>あなたの　かばんは　どこですか。</p>
  <p id="ch">你的包在哪？</p>
  <p>わたしの　かばんは　ここです。</p>
  <p id="ch">我的包在这儿。</p>
  <hr>
  <p><ruby>受付<rt>うけつけ</rt></ruby>は　どちらですか。</p>
  <p id="ch">接待处在哪里？</p>
  <p>あちらです。</p>
  <p id="ch">在那里。</p>
  <hr>
</body>
</html>
