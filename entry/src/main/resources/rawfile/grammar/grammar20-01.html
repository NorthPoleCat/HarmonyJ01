<body>
  <h1>名[人]は　[动基本形] ことが　できます</h1>
  <h2>释义：表示拥有某项能力。</h2><a style="font-size: 2em" href="../Lessons/Lesson20.html">首次出现于初级上，20课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p>スミスさんは　ピアノを　<ruby>弾<rt>ひ</rt></ruby>く　ことが　できます。</p>
  <p id="ch">史密斯先生会弹钢琴。</p>
  <hr>
  <p><ruby>森<rt>もり</rt></ruby>さんは　<ruby>中<rt>ちゅう</rt></ruby><ruby>華<rt>か</rt></ruby><ruby>料<rt>りょう</rt></ruby><ruby>理<rt>り</rt></ruby>を　<ruby>作<rt>つく</rt></ruby>る　ことが　できますか。</p>
  <p id="ch">森先生会做中国菜吗？</p>
  <p>ーーーーはい，できます。</p>
  <p id="ch">ーーーー是的，会做。</p>
  <hr>
</body>
