  <h1>动词意志形</h1>
  <h2>变形规律：</h2>
  <p><span style="font-weight: 600">五段动词</span>：将词尾的<span style="color: #e5aa5a;font-weight: 600">う段假名</span>改为对应的<span style="color: #e5aa5a;font-weight: 600">お段假名的长音</span></p>
  <p>例：買うー>買おう　待つー>待とう　売るー>売ろう</p>
  <hr>
  <p><span style="font-weight: 600">一段动词</span>：将词尾的る换成よう</p>
  <p>例：食べるー>食べよう　見るー>見よう</p>
  <hr>
  <p><span style="font-weight: 600">カ变动词</span>：来るー>こよう</p>
  <p><span style="font-weight: 600">サ变动词</span>：するー>しよう</p>
  <br>
  <p style="background:#e4e4e4;">例句：</p>
  <p>もう<ruby>１１<rt>じゅういち</rt></ruby><ruby>時<rt>じ</rt></ruby>だから，<ruby>寝<rt>ね</rt></ruby>よう。</p>
  <p id="ch">已经11点了，睡觉吧。</p>
  <hr>
  <p><ruby>仕<rt>し</rt></ruby><ruby>事<rt>ごと</rt></ruby>が<ruby>終<rt>お</rt></ruby>わってから，<ruby>飲<rt>の</rt></ruby>みに<ruby>行<rt>い</rt></ruby>こうよ。</p>
  <p id="ch">工作结束后去喝酒吧。</p>
  <hr>
  <p><ruby>手<rt>て</rt></ruby><ruby>伝<rt>つだ</rt></ruby>おうか。</p>
  <p id="ch">我来帮着做吧。</p>
  <hr>
