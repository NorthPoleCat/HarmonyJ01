<body>
  <h1>[动た]　ばかりです</h1>
  <h2>释义：表示动作或事情刚刚结束。</h2><a style="font-size:2em" href="../Lessons/Lesson40.html">首次出现于初级下，40课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p>このモノレールは，<ruby>去年開通<rt>きょねんかいつう</rt></ruby>した　ばかりです。</p>
  <p id="ch">这条单轨铁路是去年刚开通的。</p>
  <hr>
  <p>わたしは，<ruby>先月<rt>せんげつ</rt></ruby><ruby>中<rt>ちゅう</rt></ruby><ruby>国<rt>ごく</rt></ruby>に<ruby>来<rt>き</rt></ruby>た　ばかりです。</p>
  <p id="ch">我上个月刚来中国。</p>
  <hr>
  <p>この<ruby>本<rt>ほん</rt></ruby>は，<ruby>昨日<rt>きのう</rt></ruby><ruby>読<rt>よ</rt></ruby>んだ　ばかりです。</p>
  <p id="ch">这本书我昨天刚看完。</p>
  <hr>

  <h2 style="background:#e4e4e4;">同义句型：</h2>
  <p><span style="color: #e5aa5a;font-weight: 600">备注：</span>'～たばかりです'可以表示动作结束后经过了较长一段时间，而'～たところです'一般用于动作结束后经过的时间极短。</p>
  <p class="tooltip" grammar="grammar40-01" onclick="grammarClick(this);">[动た]　ところです</p></br>
  <br>
</body>
