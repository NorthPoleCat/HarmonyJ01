<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>
<head>
  <meta charset="UTF-8">

<body>
  <h1>名　を　[动ます形去掉ます]たいです</h1>
  <h2>释义：<span style="color: #e5aa5a">想要...</span></h2><a style="font-size: 2em" href="../Lessons/Lesson17.html">首次出现于初级上，17课</a>
  <p><span style="color: #e5aa5a;font-weight: 600">备注：</span>'たい'的对象有时不用'を'，而是用'が'修饰。但'欲しい'的对象只能用'が'来修饰。</p>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>映<rt>えい</rt></ruby><ruby>画<rt>が</rt></ruby>を　<ruby>見<rt>み</rt></ruby>たいです。</p>
  <p id="ch">我想看电影。</p>
  <hr>
  <p>お<ruby>酒<rt>さけ</rt></ruby>を　<ruby>飲<rt>の</rt></ruby>みたく　ないです。</p>
  <p id="ch">今天不想喝酒。</p>
  <hr>
  <p><ruby>何<rt>なに</rt></ruby>　も　したく　ありません。</p>
  <p id="ch">什么都不想做。</p>
  <hr>
  <p><ruby>水<rt>みず</rt></ruby>が　<ruby>飲<rt>の</rt></ruby>みたいです。</p>
  <p id="ch">我想喝水。</p>
  <hr>
</body>
</html>
