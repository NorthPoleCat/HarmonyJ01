  <h1>[动ない形去掉ない] なければなりません</h1>
  <h2>释义：表示必须。</h2><a style="font-size: 2em" href="../Lessons/Lesson19.html">首次出现于初级上，19课</a>
  <p><span style="color: #e5aa5a;font-weight: 600">备注：</span>也可以使用<span style="color: #e5aa5a;font-weight: 600">"ないと　いけません"</span>代替<span style="color: #e5aa5a;font-weight: 600">"なければ　なりません"</span></p>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>李<rt>り</rt></ruby>さんは　<ruby>今日<rt>きょう</rt></ruby>　<ruby>早<rt>はや</rt></ruby>く　<ruby>帰<rt>かえ</rt></ruby>らなければ　なりません。</p>
  <p id="ch">小李今天必须早点回家。</p>
  <hr>
  <p>この　<ruby>薬<rt>くすり</rt></ruby>は　<ruby>毎日<rt>まいにち</rt></ruby>　<ruby>飲<rt>の</rt></ruby>まなければ　なりません。</p>
  <p id="ch">这个药必须每天吃。</p>
  <hr>
  <p>すぐに　<ruby>書類<rt>しょるい</rt></ruby>を　<ruby>送<rt>おく</rt></ruby>らないと　いけません。</p>
  <p id="ch">得马上把文件寄出去。</p>
  <hr>
</body>
</html>
