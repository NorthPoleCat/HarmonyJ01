<body>
  <h1>名は　名が　一类形/二类形です</h1>
  <h2>用来表达情感的句型。名词1表示<span style="color: #e5aa5a">主语（助词は修饰）</span>，名词2表示<span style="color: #e5aa5a">情感的对象（助词が修饰）</span>。</h2><a style="font-size: 2em" href="../Lessons/Lesson11.html">首次出现于初级上，11课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>小野<rt>おの</rt></ruby>さんは　<ruby>歌<rt>うた</rt></ruby>が　<ruby>好<rt>す</rt></ruby>きです。</p>
  <p id="ch">小野女士喜欢唱歌。</p>
  <hr>
  <p><ruby>王<rt>おう</rt></ruby>さんは　<ruby>肉<rt>にく</rt></ruby>が　<ruby>嫌<rt>きら</rt></ruby>いです。</p>
  <p id="ch">小王不喜欢吃肉。</p>
  <hr>
  <p><ruby>林<rt>はやし</rt></ruby>さんは　<ruby>犬<rt>いぬ</rt></ruby>が　<ruby>怖<rt>こわ</rt></ruby>いです。</p>
  <p id="ch">林先生害怕狗。</p>
  <hr>
</body>
</html>
