<body>
  <h1>动词[基本形/ない形] つもりです</h1>
  <h2>释义：表示说话之前已经形成的意志、打算。</h2><a style="font-size:2em" href="../Lessons/Lesson32.html">首次出现于初级下，32课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>今<rt>こん</rt></ruby><ruby>度<rt>ど</rt></ruby>の<ruby>日曜<rt>にちよう</rt></ruby><ruby>日<rt>び</rt></ruby>に<ruby>遊園<rt>ゆうえん</rt></ruby><ruby>地<rt>ち</rt></ruby>へ　<ruby>行<rt>い</rt></ruby>く　つもりです。</p>
  <p id="ch">这个星期天打算去游乐园。</p>
  <hr>
  <p>ボーナスで<ruby>車<rt>くるま</rt></ruby>を　<ruby>買<rt>か</rt></ruby>う　つもりです。</p>
  <p id="ch">打算用奖金买车。</p>
  <hr>
  <p>もうタバコを　<ruby>吸<rt>す</rt></ruby>わない　つもりです。</p>
  <p id="ch">已经决定戒烟了。</p>
  <hr>
  <h2 style="background:#e4e4e4;">同义句型：</h2>
  <p class="tooltip" grammar="grammar24-01" onclick="grammarClick(this);">动[意志形]と　思っています</p></br>
  <br>
