<body>
  <h1>名に</h1>
  <h2>释义："～に"可以用来表示用途和基准。</h2><a style="font-size:2em" href="../Lessons/Lesson36.html">首次出现于初级下，36课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p>この<ruby>写真<rt>しゃしん</rt></ruby>は<ruby>何<rt>なん</rt></ruby>に<ruby>使<rt>つか</rt></ruby>いますか。</p>
  <p id="ch">这张照片是做什么用的？</p>
  <hr>
  <p>この<ruby>本<rt>ほん</rt></ruby>は，<ruby>大人<rt>おとな</rt></ruby>には<ruby>易<rt>やさ</rt></ruby>しいです。しかし，<ruby>子供<rt>こども</rt></ruby>には<ruby>難<rt>むずか</rt></ruby>しいです。</p>
  <p id="ch">这本书对大人来说很容易，可是对孩子来说太难了。</p>
  <hr>
  <p>この<ruby>写真<rt>しゃしん</rt></ruby>はパスポートを<ruby>申請<rt>しんせい</rt></ruby>するのに<ruby>使<rt>つか</rt></ruby>います。</p>
  <p id="ch">这张照片是申请护照时用的。</p>
  <hr>
  <p>このマンションは<ruby>買<rt>か</rt></ruby>い<ruby>物<rt>もの</rt></ruby>するのに<ruby>便<rt>べん</rt></ruby><ruby>利<rt>り</rt></ruby>です。</p>
  <p id="ch">这个公寓出去购物非常方便。</p>
  <hr>
</body>
