<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" type="text/css" href="../StaticFiles/Grammar.css">

<body>
  <h1>名 は 名です</h1>
  <h2>释义1：<span style="color: #e5aa5a">～是～</span> </h2><a style="font-size:2em" href="../Lessons/Lesson01.html">首次出现于初级上，01课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>李<rt>り</rt></ruby>さん　は　<ruby>中<rt>ちゅう</rt></ruby><ruby>国人<rt>ごくじん</rt></ruby>です。</p>
  <p id="ch">小李是中国人。</p>
  <hr>
  <p>わたし　は　<ruby>日<rt>に</rt></ruby><ruby>本人<rt>ほんじん</rt></ruby>です。</p>
  <p id="ch">我是日本人。</p>
  <hr>
  <p>わたし　は　<ruby>王<rt>おう</rt></ruby>です。</p>
  <p id="ch">我姓王。</p>
  <hr>
  <br>
  <h2>释义2：<span style="color: #e5aa5a">～在～</span> </h2><a style="font-size:2em" href="../Lessons/Lesson03.html">首次出现于初级上，03课</a>
  <p><span style="color: #e5aa5a;font-weight: 600">备注：</span>这里名词2代表场所。</p>
  <p style="background:#e4e4e4">例句：</p>
  <p><ruby>食<rt>しょく</rt></ruby><ruby>堂<rt>どう</rt></ruby>は　デパートの　<ruby>７階<rt>ななかい</rt></ruby>　です。</p>
  <p id="ch">食堂在百货商店的7层。</p>
  <hr>
  <p>トイレは　ここです。</p>
  <p id="ch">厕所在这儿。</p>
  <hr>
  <p><ruby>小野<rt>おの</rt></ruby>さんは　<ruby>事務<rt>じむ</rt></ruby><ruby>所<rt>しょ</rt></ruby>です。</p>
  <p id="ch">小野女士在事务所。</p>
  <hr>
  <br>
  <p style="color: red;font-size: 3em">此句型为高频基础句型，原则上第一课后不再给予标注。</p>
</body>
</html>
