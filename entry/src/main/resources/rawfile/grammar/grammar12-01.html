<body>
  <h1>名は　名より　一类形/二类形　です</h1>
  <h2>释义：<span style="color: #e5aa5a">〜比～更～</span></h2><a style="font-size: 2em" href="../Lessons/Lesson12.html">首次出现于初级上，12课</a>
  <p><span style="color: #e5aa5a;font-weight: 600">备注：</span>程度差异较大时使用‘ずっと’加以强调。</p>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>李<rt>り</rt></ruby>さんは　<ruby>森<rt>もり</rt></ruby>さんより　<ruby>若<rt>わか</rt></ruby>いです。</p>
  <p id="ch">小李比森先生年轻。</p>
  <hr>
  <p><ruby>中<rt>ちゅう</rt></ruby><ruby>国<rt>ごく</rt></ruby>は　<ruby>日<rt>に</rt></ruby><ruby>本<rt>ほん</rt></ruby>より　<ruby>広<rt>ひろ</rt></ruby>いです。</p>
  <p id="ch">中国比日本辽阔。</p>
  <hr>
  <p><ruby>上海<rt>シャンハイ</rt></ruby>は　<ruby>北<rt>ぺ</rt></ruby><ruby>京<rt>キン</rt></ruby>より　にぎやかですか。</p>
  <p id="ch">上海比北京热闹吗？</p>
  <hr>
  <p><ruby>中<rt>ちゅう</rt></ruby><ruby>国<rt>ごく</rt></ruby>は　<ruby>日<rt>に</rt></ruby><ruby>本<rt>ほん</rt></ruby>より　ずっと　<ruby>広<rt>ひろ</rt></ruby>いです。</p>
  <p id="ch">中国比日本辽阔得多。</p>
  <hr>
</body>
</html>
