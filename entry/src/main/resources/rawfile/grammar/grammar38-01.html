<body>
  <h1>可能形式</h1>
  <h2>变形规律：</h2>
  <p><span style="font-weight: 600">五段动词</span>：将词尾的<span style="color: #e5aa5a;font-weight: 600">う段假名</span>改为对应的<span style="color: #e5aa5a;font-weight: 600">え段假名</span>，再加上'る'</p>
  <p>例：買うー>買える　待つー>待てる　売るー>売れる</p>
  <hr>
  <p><span style="font-weight: 600">一段动词</span>：将词尾的る换成られる</p>
  <p>例：食べるー>食べられる　見るー>見られる</p>
  <hr>
  <p><span style="font-weight: 600">カ变动词</span>：来るー>こられる</p>
  <p><span style="font-weight: 600">サ变动词</span>：するー>できる</p>
  <hr>
  <h3 style="font-weight: 600">可能形式的活用方式与一段动词相同。</h3>
  <table border="1">
  <tr>
  <td>可能形式(基本形)</td>
  <td>可能形式(ない形)</td>
  <td>可能形式(た形)</td>
  <td>可能形式(なかった形)</td>
  </tr>
  <tr>
  <td>書ける</td>
  <td>書けない</td>
  <td>書けた</td>
  <td>書けなかった</td>
  </tr>
  <tr>
  <td>食べられる</td>
  <td>食べられない</td>
  <td>食べられた</td>
  <td>食べられなかった</td>
  </tr>
  <tr>
  <td>来られる</td>
  <td>来られない</td>
  <td>来られた</td>
  <td>来られなかった</td>
  </tr>
  </table>
