<body>
  <h1>名 や 名</h1>
  <h2>释义：<span style="color: #e5aa5a">～和～</span></h2><a style="font-size: 2em" href="../Lessons/Lesson11.html">首次出现于初级上，11课</a>
  <p><span style="color: #e5aa5a;font-weight: 600">备注1：</span>用法类似于助词と，两者的区别在于，<span style="color: #e5aa5a;font-weight: 600">と</span>用于<span style="color: #e5aa5a;font-weight: 600">列举所有的项目</span>。而<span style="color: #e5aa5a;font-weight: 600">や</span>用于<span style="color: #e5aa5a;font-weight: 600">列举所有项目中的两项</span>。相当于汉语中的<span style="color: #e5aa5a;font-weight: 600">“～呀～什么的”</span>。</p>
  <p><span style="color: #e5aa5a;font-weight: 600">备注2：</span>や常常与など呼应，构成“～や　〜など”。</p>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>吉<rt>よし</rt></ruby><ruby>田<rt>だ</rt></ruby>さんは　<ruby>時々<rt>ときどき</rt></ruby>　<ruby>中<rt>ちゅう</rt></ruby><ruby>国<rt>ごく</rt></ruby>や　<ruby>韓国<rt>かんこく</rt></ruby>へ　<ruby>行<rt>い</rt></ruby>きます。</p>
  <p id="ch">吉田先生有时去中国呀韩国什么的。</p>
  <hr>
  <p><ruby>森<rt>もり</rt></ruby>さんは　サッカーや　<ruby>野<rt>や</rt></ruby><ruby>球<rt>きゅう</rt></ruby>が　<ruby>好<rt>す</rt></ruby>きです。</p>
  <p id="ch">森先生喜欢足球呀棒球什么的。</p>
  <hr>
  <p>わたしは　お<ruby>店<rt>みせ</rt></ruby>で　<ruby>野<rt>や</rt></ruby><ruby>菜<rt>さい</rt></ruby>や　<ruby>果物<rt>くだもの</rt></ruby>などを　<ruby>買<rt>か</rt></ruby>いました。</p>
  <p id="ch">我在店里买了蔬菜呀水果等等。</p>
  <hr>
</body>
