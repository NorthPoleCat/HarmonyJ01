<body>
  <h1>名 の 名</h1>
  <h2>释义：<span style="color: #e5aa5a">～的～</span></h2><a style="font-size:2em" href="../Lessons/Lesson01.html">首次出现于初级上，01课</a>
  <p><span style="color: #e5aa5a;font-weight: 600">备注：</span>助词"の"连接名词和名词，表示前面的名词是后面名词从属的机构・国家・属性。</p>
  <p style="background:#e4e4e4">例句：</p>
  <p><ruby>李<rt>り</rt></ruby>さん　は　JC<ruby>企<rt>き</rt></ruby><ruby>画<rt>かく</rt></ruby>の　<ruby>社員<rt>しゃいん</rt></ruby>です。</p>
  <p id="ch">小李是JC策划公司的职员。</p>
  <hr>
  <p><ruby>北<rt>ペ</rt></ruby><ruby>京旅行社<rt>キンりょこうしゃ</rt></ruby>は　<ruby>中<rt>ちゅう</rt></ruby><ruby>国<rt>ごく</rt></ruby> の　<ruby>企<rt>き</rt></ruby><ruby>業<rt>ぎょう</rt></ruby>です。</p>
  <p id="ch">北京旅行社是中国的企业。</p>
  <hr>
  <p>デュポンさんは　<ruby>大学<rt>だいがく</rt></ruby>の　<ruby>先生<rt>せんせい</rt></ruby>です。</p>
  <p id="ch">迪蓬先生是大学老师。</p>
  <hr>
  <br>
  <p style="color: red;font-size: 3em">此句型为高频基础句型，原则上第一课后不再给予标注。</p>
</body>
</html>
