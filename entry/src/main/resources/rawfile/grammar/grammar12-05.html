<body>
  <h1>名と　名と　どちらが　一类形/二类形　ですか</h1>
  <h2>释义：<span style="color: #e5aa5a">～和～，哪一个更～？</span></h2><a style="font-size: 2em" href="../Lessons/Lesson12.html">首次出现于初级上，12课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>日<rt>に</rt></ruby><ruby>本<rt>ほん</rt></ruby><ruby>語<rt>ご</rt></ruby>と　<ruby>英<rt>えい</rt></ruby><ruby>語<rt>ご</rt></ruby>と　どちらが　<ruby>難<rt>むずか</rt></ruby>しいですか。</p>
  <p id="ch">日语和英语，哪个难学？</p>
  <p>ーーーー　<ruby>日<rt>に</rt></ruby><ruby>本<rt>ほん</rt></ruby><ruby>語<rt>ご</rt></ruby>の　ほうが　<ruby>難<rt>むずか</rt></ruby>しいです。</p>
  <p id="ch">ーーーー　日语难学。</p>
  <hr>
  <p>コーヒーと　<ruby>紅茶<rt>こうちゃ</rt></ruby>と　どちらが　<ruby>好<rt>す</rt></ruby>きですか。</p>
  <p id="ch">咖啡和红茶，更喜欢哪个？</p>
  <p>ーーーー　<ruby>紅茶<rt>こうちゃ</rt></ruby>の　ほうが　<ruby>好<rt>す</rt></ruby>きです。</p>
  <p id="ch">ーーーー　更喜欢红茶。</p>
  <p>ーーーー　どちらも　<ruby>好<rt>す</rt></ruby>きです。</p>
  <p id="ch">ーーーー　哪个都喜欢。</p>
  <hr>
</body>
