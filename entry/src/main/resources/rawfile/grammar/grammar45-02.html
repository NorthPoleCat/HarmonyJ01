  <h1>小句し，小句し，小句</h1>
  <h2>释义：叙述并列的几个事项。</h2><a style="font-size:2em" href="../Lessons/Lesson45.html">首次出现于初级下，45课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p>おいしいし，<ruby>手<rt>て</rt></ruby><ruby>軽<rt>がる</rt></ruby>だし，わたしは<ruby>冷凍<rt>れいとう</rt></ruby><ruby>食<rt>しょく</rt></ruby><ruby>品<rt>ひん</rt></ruby>をよく<ruby>食<rt>た</rt></ruby>べます。</p>
  <p id="ch">又好吃，又简便，我经常吃冷冻食品。</p>
  <hr>
  <p><ruby>休<rt>やす</rt></ruby>みだし，<ruby>天<rt>てん</rt></ruby><ruby>気<rt>き</rt></ruby>もいいし，どこかに<ruby>出<rt>で</rt></ruby>かけませんか。</p>
  <p id="ch">今天休息，天气也不错，去哪儿玩儿玩儿吧？</p>
  <hr>
  <p>にぎやかだし，<ruby>高<rt>たか</rt></ruby>いビルが<ruby>多<rt>おお</rt></ruby>いし，なんか<ruby>東<rt>とう</rt></ruby><ruby>京<rt>きょう</rt></ruby>に<ruby>似<rt>に</rt></ruby>ていますね。</p>
  <p id="ch">又繁华，高层建筑又多，总觉得有点儿像东京啊。</p>
  <hr>
