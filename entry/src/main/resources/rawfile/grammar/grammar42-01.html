<body>
  <h1>～まま</h1>
  <h2>释义：表示理应改变的状态保持着去进行另外的动作。</h2><a style="font-size:2em" href="../Lessons/Lesson42.html">首次出现于初级下，42课</a>
   <p><span style="color: #e5aa5a;font-weight: 600">备注：</span>'まま'前不能用敬体形。</p>
  <p style="background:#e4e4e4;">语法形式：</p>
  <p>1.小句[た形/ない形] まま，小句</p>
  <p>2.名 の　まま，小句</p>

  <p style="background:#e4e4e4;">例句：</p>
  <p>テレビをつけたまま，<ruby>出<rt>で</rt></ruby>かけてしまいました。</p>
  <p id="ch">开着电视就出门了。</p>
  <hr>
  <p><ruby>李<rt>り</rt></ruby>さんはコートを<ruby>着<rt>き</rt></ruby>たまま，ベッドで<ruby>寝<rt>ね</rt></ruby>てしまいました。</p>
  <p id="ch">小李穿着外套就躺在床上睡了。</p>
  <hr>
  <p><ruby>馬<rt>ば</rt></ruby>さんは<ruby>行<rt>い</rt></ruby>き<ruby>先<rt>さき</rt></ruby>を<ruby>告<rt>つ</rt></ruby>げないまま，<ruby>家<rt>いえ</rt></ruby>を<ruby>出<rt>で</rt></ruby>てしまいました。</p>
  <p id="ch">小马没有说去哪里就离开了家。</p>
  <hr>
  <p>わたしたちは<ruby>空腹<rt>くうふく</rt></ruby>のまま，<ruby>出<rt>しゅっ</rt></ruby><ruby>発<rt>ぱつ</rt></ruby>しました。</p>
  <p id="ch">我们空着肚子就出发了。</p>
  <hr>
</body>
