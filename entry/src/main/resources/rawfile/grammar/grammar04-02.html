<body>
  <h1>助词と</h1>
  <h2>语法1：名　と　名</h2>
  <h2>释义：<span style="color: #e5aa5a">～和～</span></h2><a style="font-size:2em" href="../Lessons/Lesson04.html">首次出现于初级上，04课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>時<rt>と</rt></ruby><ruby>計<rt>けい</rt></ruby>　と　<ruby>眼鏡<rt>めがね</rt></ruby>。</p>
  <p id="ch">表和眼镜。</p>
  <hr>
  <p>ビール　と　ウイスキー。</p>
  <p id="ch">啤酒和威士忌。</p>
  <hr>
  <p><ruby>居間<rt>いま</rt></ruby>に　テレビ　と　ビデオが　あります。</p>
  <p id="ch">起居室里有电视和录像机。</p>
  <hr>
  <h2>语法2：名[人]　と　动</h2>
  <h2>释义：<span style="color: #e5aa5a">共同做某事的对象</span>用助词"と"修饰。</h2><a style="font-size:2em" href="../Lessons/Lesson04.html">首次出现于初级上，04课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>小野<rt>おの</rt></ruby>さんは　<ruby>友達<rt>ともだち</rt></ruby>と　<ruby>帰<rt>かえ</rt></ruby>りました。</p>
  <p id="ch">小野女士和朋友一起回去了。</p>
  <hr>
  <p><ruby>李<rt>り</rt></ruby>さんは　だれと　<ruby>日<rt>に</rt></ruby><ruby>本<rt>ほん</rt></ruby>へ　<ruby>来<rt>き</rt></ruby>ましたか。</p>
  <p id="ch">小李和谁一块儿来日本的？</p>
  <hr>
