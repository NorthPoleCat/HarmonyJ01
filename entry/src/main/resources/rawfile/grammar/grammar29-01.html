<body>
  <h1>动词命令形</h1>
  <h2>变形规律：</h2>
  <p><span style="font-weight: 600">五段动词</span>：将词尾的<span style="color: #e5aa5a;font-weight: 600">う段假名</span>改为对应的<span style="color: #e5aa5a;font-weight: 600">え段假名</span></p>
  <p>例：買うー>買え　待つー>待て　売るー>売れ</p>
  <hr>
  <p><span style="font-weight: 600">一段动词</span>：将词尾的る换成ろ</p>
  <p>例：食べるー>食べろ　見るー>見ろ</p>
  <hr>
  <p><span style="font-weight: 600">カ变动词</span>：来るー>こい</p>
  <p><span style="font-weight: 600">サ变动词</span>：するー>しろ</p>
  <br>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>電<rt>でん</rt></ruby><ruby>気<rt>き</rt></ruby>を　<ruby>消<rt>け</rt></ruby>せ。</p>
  <p id="ch">关灯！</p>
  <hr>
  <p><ruby>書類<rt>しょるい</rt></ruby>を<ruby>早<rt>はや</rt></ruby>く　<ruby>提<rt>てい</rt></ruby><ruby>出<rt>しゅう</rt></ruby>しろ。</p>
  <p id="ch">快交文件！</p>
  <hr>
  <h2>祈使句相关语法：</h2>
  <p class="tooltip" grammar="grammar29-01" onclick="grammarClick(this);">动词命令形</p><br>
  <p class="tooltip" grammar="grammar29-02" onclick="grammarClick(this);">[动ます形去掉ます]＋なさい</p><br>
  <p class="tooltip" grammar="grammar29-03" onclick="grammarClick(this);">[动基本形]＋な</p><br>
  <p class="tooltip" grammar="grammar29-04" onclick="grammarClick(this);">动[て]/动[ない]で</p><br>
</body>
