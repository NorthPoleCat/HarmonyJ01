<body>
  <h1>形容词连用形</h1>
  <h2 style="background:#e4e4e4;">变形规律：</h2>
  <p><span style="font-weight: 600">一类形容词</span>：<span style="color: #e5aa5a;font-weight: 600">将形容词词尾'い'变为'く'</span></p>
  <p><span style="color: #e5aa5a;font-weight: 600">例</span>：早いー>早く　大きいー>大きく</p>
  <p><span style="font-weight: 600">二类形容词</span>：<span style="color: #e5aa5a;font-weight: 600">在形容词词干后加'に'</span></p>
  <p><span style="color: #e5aa5a;font-weight: 600">例</span>：綺麗ー>綺麗に　静かー>静かに</p>
  <h2 style="background:#e4e4e4;">使用场景：</h2>
  <p style="color: #e5aa5a;font-weight: 600">修饰动词（副词化）。</p>

</body>
</html>
