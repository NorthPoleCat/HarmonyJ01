  <h1>名は　[动基本形] ことです</h1>
  <h2>释义：<span style="color: #e5aa5a">～是～</span></h2><a style="font-size: 2em" href="../Lessons/Lesson20.html">首次出现于初级上，20课</a>
  <p><span style="color: #e5aa5a;font-weight: 600">备注：</span>[动基本形]こと 相当于名词。</p>
  <p style="background:#e4e4e4;">例句：</p>
  <p>わたしの　<ruby>趣<rt>しゅ</rt></ruby><ruby>味<rt>み</rt></ruby>は　<ruby>切<rt>きっ</rt></ruby><ruby>手<rt>て</rt></ruby>を　<ruby>集<rt>あつ</rt></ruby>める　ことです。</p>
  <p id="ch">我的爱好是集邮。</p>
  <hr>
  <p><ruby>王<rt>おう</rt></ruby>さんの　<ruby>特<rt>とく</rt></ruby><ruby>技<rt>ぎ</rt></ruby>は　<ruby>胡<rt>こ</rt></ruby><ruby>弓<rt>きゅう</rt></ruby>を　<ruby>弾<rt>ひ</rt></ruby>く　ことです。</p>
  <p id="ch">小王的特长是拉胡琴。</p>
  <hr>
  <p><ruby>森<rt>もり</rt></ruby>さんの　<ruby>夢<rt>ゆめ</rt></ruby>は　<ruby>外国<rt>がいこく</rt></ruby>が　<ruby>働<rt>はたら</rt></ruby>く　ことです。</p>
  <p id="ch">森先生的理想是在外国工作。</p>
  <hr>
</body>
