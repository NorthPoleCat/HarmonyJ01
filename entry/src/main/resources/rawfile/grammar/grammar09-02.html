  <h1>あまり　一类形（否定）／动（否定）</h1>
  <h2>"あまり"接否定形式表示程度不高。</h2><a style="font-size:2em" href="../Lessons/Lesson09.html">首次出现于初级上，09课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p>この　スープは　あまり　<ruby>熱<rt>あつ</rt></ruby>く　ないです。</p>
  <p id="ch">这个汤不太热。</p>
  <hr>
  <p><ruby>試<rt>し</rt></ruby><ruby>験<rt>けん</rt></ruby>は　あまり　<ruby>難<rt>むずか</rt></ruby>しく　ありませんでした。</p>
  <p id="ch">考试不太难。</p>
  <hr>
