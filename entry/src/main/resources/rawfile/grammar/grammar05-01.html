<body>
  <h1>今　〜時　〜分です</h1>
  <h2>释义：<span style="color: #e5aa5a">现在是～时～分</span></h2><a style="font-size:2em" href="../Lessons/Lesson05.html">首次出现于初级上，05课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>今<rt>いま</rt></ruby>　<ruby>４時<rt>よじ</rt></ruby>　です。</p>
  <p id="ch">现在是4点。</p>
  <hr>
  <p><ruby>今<rt>いま</rt></ruby>　<ruby>何<rt>なん</rt></ruby><ruby>時<rt>じ</rt></ruby>　ですか。</p>
  <p id="ch">现在是几点？</p>
  <p>ーー<ruby>8<rt>はち</rt></ruby>　<ruby>時<rt>じ</rt></ruby>　<ruby>30<rt>さんじゅっ</rt></ruby>　<ruby>分<rt>ぷん</rt></ruby>です。</p>
  <p id="ch">ーー8点30分。</p>
  <hr>
  <p><ruby>今<rt>いま</rt></ruby>　<ruby>午<rt>ご</rt></ruby><ruby>前<rt>ぜん</rt></ruby>　<ruby>8<rt>はち</rt></ruby>　<ruby>時<rt>じ</rt></ruby>　<ruby>半<rt>はん</rt></ruby>です。</p>
  <p id="ch">现在是上午8点半。</p>
  <hr>
</body>
