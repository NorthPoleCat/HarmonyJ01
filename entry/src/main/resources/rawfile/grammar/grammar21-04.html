    <h1>动 ましょうか</h1>
    <h2>释义：用于提议。</h2><a style="font-size: 2em" href="../Lessons/Lesson21.html">首次出现于初级上，21课</a>
    <p style="background:#e4e4e4;">例句：</p>
    <p><ruby>荷<rt>に</rt></ruby><ruby>物<rt>もつ</rt></ruby>を　<ruby>持<rt>も</rt></ruby>ちましょうか。</p>
    <p id="ch">我来帮你拿行李吧？</p>
    <p>ーーはい，お<ruby>願<rt>ねが</rt></ruby>いします。</p>
    <p id="ch">ーー好的，拜托你了。</p>
    <hr>
    <p><ruby>窓<rt>まど</rt></ruby>を　<ruby>閉<rt>し</rt></ruby>めましょうか。</p>
    <p id="ch">关上窗子好吗？</p>
    <p>ーーいいえ，<ruby>閉<rt>し</rt></ruby>めないで　ください。</p>
    <p id="ch">ーー不，请别关。</p>
