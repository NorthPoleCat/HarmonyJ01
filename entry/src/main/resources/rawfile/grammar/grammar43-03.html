<body>
  <h1>[动(さ)せ]て　ください</h1>
  <h2>释义：请求别人允许自己做某事。接续为<span style="color: #e5aa5a;">动词使役形的て形＋ください</span></h2><a style="font-size: 2em" href="../Lessons/Lesson43.html">首次出现于初级上，43课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>疲<rt>つか</rt></ruby>れました。<ruby>少<rt>すこ</rt></ruby>し<ruby>休<rt>やす</rt></ruby>ませてください。</p>
  <p id="ch">我累了，让我稍稍休息一会儿。</p>
  <hr>
  <p>すみません，ちょっとこの<ruby>自<rt>じ</rt></ruby><ruby>転車<rt>てんしゃ</rt></ruby>を<ruby>使<rt>つか</rt></ruby>わせてください。</p>
  <p id="ch">对不起，请让我用一下这辆自行车。</p>
  <hr>
  <p>この<ruby>仕<rt>し</rt></ruby><ruby>事<rt>ごと</rt></ruby>はわたしにやらせてください。</p>
  <p id="ch">请让我干这份工作。</p>
  <hr>
  <h2 style="color: #e5aa5a;">相似句型：</h2>
  <p class="tooltip" grammar="grammar07-03" onclick="grammarClick(this);">名を　ください</p><br>
  <p class="tooltip" grammar="grammar14-04" onclick="grammarClick(this);">动[て] ください</p><br>
  <p class="tooltip" grammar="grammar19-02" onclick="grammarClick(this);">[动ない]で　ください</p><br>
</body>
</html>
