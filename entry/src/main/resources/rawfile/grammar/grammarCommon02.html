  <h1>五段动词</h1>
  <h2 style="background:#e4e4e4;">什么是五段动词？</h2>
  <p>在日语动词中五段动词的数量是最多的，变化也是最复杂的。难以单从单词结构来判断是否是五段动词。对词性的分辨只能基于大量的背诵与训练。简单来讲，五段动词指的是不满足<a style="font-size: 1em" href="../grammar/grammarCommon03.html">一段动词</a>判定条件的动词。</p>
