<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" type="text/css" href="../StaticFiles/Grammar.css">
  <script type="text/javascript" src="../StaticFiles/Lession.js"></script>
</head>
<body>
  <h1>名を　ください</h1>
  <br>
  <h2>释义：<span style="color: #e5aa5a">请给我～</span>。买东西或餐厅点餐时常用。</h2><a style="font-size: 2em" href="../Lessons/Lesson07.html">首次出现于初级上，07课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p>コーラと　ケーキを　ください。</p>
  <p id="ch">请给我可乐和蛋糕。</p>
  <hr>
  <p><ruby>申<rt>もうし</rt></ruby><ruby>込書<rt>こみしょ</rt></ruby>を　ください。</p>
  <p id="ch">请给我一张申请表。</p>
  <hr>
  <p>この　<ruby>本<rt>ほん</rt></ruby>を　ください。</p>
  <p id="ch">我买这本书。</p>
  <hr>
  <h2 style="color: #e5aa5a;">相似句型：</h2>
  <h3 class="tooltip" grammar="grammar14-04" onclick="grammarClick(this);">动[て] ください</h3><br>
  <h3 class="tooltip" grammar="grammar19-02" onclick="grammarClick(this);">[动ない]で　ください</h3>
</body>
</html>
