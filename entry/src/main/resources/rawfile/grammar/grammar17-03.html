  <h1>动　ませんか</h1>
  <h2>表面上是疑问形式，但功能是表示提议。</h2><a style="font-size: 2em" href="../Lessons/Lesson17.html">首次出现于初级上，17课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p>いっしょに　お<ruby>茶<rt>ちゃ</rt></ruby>を　<ruby>飲<rt>の</rt></ruby>みませんか。(一起喝茶好吗?)</p>
  <p><ruby>少<rt>すこ</rt></ruby>し　<ruby>休<rt>やす</rt></ruby>みませんか。（休息一下怎么样?）</p>
  <p><ruby>明日<rt>あした</rt></ruby>　<ruby>故<rt>こ</rt></ruby><ruby>宮<rt>きゅう</rt></ruby>へ　<ruby>行<rt>い</rt></ruby>きませんか。（明天去故宫怎么样?）</p>
