<body>
  <h1>名は　名ですか,名ですか</h1>
  <h2>释义：<span style="color: #e5aa5a">～是这个吗？还是那个吗？</span></h2><a style="font-size:2em" href="../Lessons/Lesson03.html">首次出现于初级上，03课</a>
  <p><span style="color: #e5aa5a;font-weight: 600">备注：</span>答案有多种可能性，询问其中一种时，可以重复使用"ですか"。不限于两次。</p>
  <p style="background:#e4e4e4;">例句：</p>
  <p>かばん<ruby>売<rt>う</rt></ruby>り<ruby>場<rt>ば</rt></ruby>は　<ruby>１<rt>いっ</rt></ruby><ruby>階<rt>かい</rt></ruby>ですか,<ruby>２<rt>に</rt></ruby><ruby>階<rt>かい</rt></ruby>ですか。</p>
  <p id="ch">卖包的柜台在1层还是2层？</p>
  <hr>
  <p><ruby>今日<rt>きょう</rt></ruby>は　<ruby>水<rt>すい</rt></ruby><ruby>曜<rt>よう</rt></ruby><ruby>日<rt>び</rt></ruby>ですか,<ruby>土<rt>ど</rt></ruby><ruby>曜<rt>よう</rt></ruby><ruby>日<rt>び</rt></ruby>ですか。</p>
  <p id="ch">今天是星期三还是星期四？</p>
  <hr>
  <p><ruby>林<rt>はやし</rt></ruby>さんは　<ruby>韓国人<rt>かんこくじん</rt></ruby>ですか,<ruby>日<rt>に</rt></ruby><ruby>本人<rt>ほんじん</rt></ruby>ですか,<ruby>中<rt>ちゅう</rt></ruby><ruby>国<rt>ごく</rt></ruby><ruby>人<rt>じん</rt></ruby>ですか。ーーーー<ruby>日<rt>に</rt></ruby><ruby>本人<rt>ほんじん</rt></ruby>です。</p>
  <p id="ch">林先生是韩国人？日本人？还是中国人？----是日本人</p>
  <hr>
</body>
