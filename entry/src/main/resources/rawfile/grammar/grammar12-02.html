<body>
  <h1>名より　名の　ほうが　一类形/二类形　です</h1>
  <h2>释义：<span style="color: #e5aa5a">与～相比，～更～</span></h2><a style="font-size: 2em" href="../Lessons/Lesson12.html">首次出现于初级上，12课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>日<rt>に</rt></ruby><ruby>本<rt>ほん</rt></ruby>より　<ruby>中<rt>ちゅう</rt></ruby><ruby>国<rt>ごく</rt></ruby>の　ほうが　<ruby>広<rt>ひろ</rt></ruby>いです。</p>
  <p id="ch">与日本相比，中国更辽阔。</p>
  <hr>
  <p><ruby>北<rt>ぺ</rt></ruby><ruby>京<rt>キン</rt></ruby>より　<ruby>東<rt>とう</rt></ruby><ruby>京<rt>きょう</rt></ruby>の　ほうが　<ruby>暖<rt>あたた</rt></ruby>かいです。</p>
  <p id="ch">与北京相比，东京更暖和。</p>
  <hr>
  <p><ruby>大阪<rt>おおさか</rt></ruby>より　<ruby>東<rt>とう</rt></ruby><ruby>京<rt>きょう</rt></ruby>の　ほうが　にぎやかですか。</p>
  <p id="ch">与大阪相比，东京更热闹吗？</p>
  <hr>
</body>
</html>
