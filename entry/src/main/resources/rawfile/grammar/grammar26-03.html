<body>
  <h1>小句[简体]＋かもしれません</h1>
  <h2>表示有可能发生。</h2><a style="font-size:2em" href="../Lessons/Lesson26.html">首次出现于初级下，26课</a>
  <p style="background:#e4e4e4;">语法形式：</p>
  <p>动词小句/一类形容词小句：直接在简体形后面加'かもしれません'。</p>
  <p>二类形容词小句/名词小句：把简体形的'だ'换成'かもしれません'。</p>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>森<rt>もり</rt></ruby>さんは<ruby>今日<rt>きょう</rt></ruby><ruby>会社<rt>かいしゃ</rt></ruby>を<ruby>休<rt>やす</rt></ruby>むかもしれません。</p>
  <p id="ch">森先生今天也许不来公司上班了。</p>
  <hr>
  <p><ruby>来<rt>らい</rt></ruby><ruby>週<rt>しゅう</rt></ruby>は<ruby>暇<rt>ひま</rt></ruby>かもしれません。</p>
  <p id="ch">下周也许有空。</p>
  <hr>
  <p><ruby>明日<rt>あした</rt></ruby>は<ruby>雪<rt>ゆき</rt></ruby>かもしれません。</p>
  <p id="ch">明天可能下雪。</p>
  <hr>
  <h2 style="background:#e4e4e4;">相似句型：</h2>
  <p class="tooltip" grammar="grammar26-02" onclick="grammarClick(this);">小句[简体]＋でしょう</p></br>
</body>
