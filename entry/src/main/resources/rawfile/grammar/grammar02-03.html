<body>
  <h1>この/その/あの 名　は 名 です</h1>
  <h2>释义：<span style="color: #e5aa5a">这是～/那是～</span></h2><a style="font-size:2em" href="../Lessons/Lesson02.html">首次出现于初级上，02课</a>
  <p><span style="color: #e5aa5a;font-weight: 600">备注：</span>修饰名词时，要使用"この/その/あの"。其表示的位置关系与"これ/それ/あれ"相同。</p>
  <p style="background:#e4e4e4;">例句：</p>
  <p>この　カメラは　スミスさんのです。</p>
  <p id="ch">这个照相机是史密斯先生的。</p>
  <hr>
  <p>その　<ruby>自<rt>じ</rt></ruby><ruby>転車<rt>てんしゃ</rt></ruby>は　<ruby>森<rt>もり</rt></ruby>さんのです。</p>
  <p id="ch">那辆自行车是森先生的。</p>
  <hr>
  <p>あの　ノートは　だれのですか。</p>
  <p id="ch">那个笔记本是谁的？</p>
  <hr>
</body>
</html>
