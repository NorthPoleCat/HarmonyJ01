<body>
  <h1>ここ/そこ/あそこ は 名 です</h1>
  <h2>释义：<span style="color: #e5aa5a">这里是～/那里是～</span></h2><a style="font-size:2em" href="../Lessons/Lesson03.html">首次出现于初级上，03课</a>
  <p><span style="color: #e5aa5a;font-weight: 600">备注1</span>："ここ/そこ/あそこ"所表示的位置关系与"これ/それ/あれ"相同。</p>
  <p><span style="color: #e5aa5a;font-weight: 600">备注2</span>："こちら/そちら/あちら"是"ここ/そこ/あそこ"的礼貌说法。</p>
  <p style="background:#e4e4e4;">例句：</p>
  <p>ここは　デパートです。</p>
  <p id="ch">这里是百货商店。</p>
  <hr>
  <p>そこは　<ruby>図<rt>と</rt></ruby><ruby>書館<rt>しょかん</rt></ruby>です。</p>
  <p id="ch">那里是图书馆。</p>
  <hr>
  <p>あそこは　<ruby>入<rt>い</rt></ruby>り<ruby>口<rt>ぐち</rt></ruby>です。</p>
  <p id="ch">那儿是入口。</p>
  <hr>
</body>
</html>
