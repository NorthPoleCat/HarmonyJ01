  <h1>动[て]　动</h1>
  <h2>表示动作相继发生。</h2><a style="font-size: 2em" href="../Lessons/Lesson14.html">首次出现于初级上，14课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>昨日<rt>きのう</rt></ruby>，デパートへ　<ruby>行<rt>い</rt></ruby>って，<ruby>買<rt>か</rt></ruby>い<ruby>物<rt>もの</rt></ruby>しました。</p>
  <p id="ch">昨天去商场买东西了。</p>
  <hr>
  <p><ruby>家<rt>いえ</rt></ruby>へ　<ruby>帰<rt>かえ</rt></ruby>って，<ruby>宿<rt>しゅく</rt></ruby><ruby>題<rt>だい</rt></ruby>を　します。</p>
  <p id="ch">回家，然后做作业。</p>
  <hr>
  <p><ruby>図<rt>と</rt></ruby><ruby>書館<rt>しょかん</rt></ruby>へ　<ruby>行<rt>い</rt></ruby>って　<ruby>本<rt>ほん</rt></ruby>を　<ruby>借<rt>か</rt></ruby>りて，<ruby>家<rt>いえ</rt></ruby>へ　<ruby>帰<rt>かえ</rt></ruby>ります。</p>
  <p id="ch">去图书馆借书，然后回家。</p>
  <hr>
