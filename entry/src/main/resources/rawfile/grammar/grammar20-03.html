<body>
  <h1>[动基本形] 前に, 〜</h1>
  <h2>释义：<span style="color: #e5aa5a">在～之前</span></h2><a style="font-size: 2em" href="../Lessons/Lesson20.html">首次出现于初级上，20课</a>
  <p><span style="color: #e5aa5a;font-weight: 600">备注：</span>也可以使用<span style="color: #e5aa5a;font-weight: 600">"名+の+前に"</span></p>
  <p style="background:#e4e4e4;">例句：</p>
  <p>こちらへ　<ruby>来<rt>く</rt></ruby>る　<ruby>前<rt>まえ</rt></ruby>に　<ruby>電<rt>でん</rt></ruby><ruby>話<rt>わ</rt></ruby>を　かけて　ください。</p>
  <p id="ch">来之前请打个电话。</p>
  <hr>
  <p><ruby>毎日<rt>まいにち</rt></ruby>　<ruby>寝<rt>ね</rt></ruby>る　<ruby>前<rt>まえ</rt></ruby>に　シャワーを　<ruby>浴<rt>あ</rt></ruby>びます。</p>
  <p id="ch">每天睡觉前淋浴。</p>
  <hr>
  <p><ruby>会<rt>かい</rt></ruby><ruby>議<rt>ぎ</rt></ruby>の　<ruby>前<rt>まえ</rt></ruby>に　<ruby>資<rt>し</rt></ruby><ruby>料<rt>りょう</rt></ruby>を　コピーします。</p>
  <p id="ch">开会之前复印资料。</p>
  <hr>
</body>
