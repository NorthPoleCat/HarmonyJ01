<body>
  <h1>他动[て]　あります</h1>
  <h2>释义：表示有意进行的动作结果的存续状态。</h2><a style="font-size:2em" href="../Lessons/Lesson34.html">首次出现于初级下，34课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>壁<rt>かべ</rt></ruby>にカレンダーが　<ruby>掛<rt>か</rt></ruby>けて　あります。</p>
  <p id="ch">墙上挂着挂历。</p>
  <hr>
  <p><ruby>窓<rt>まど</rt></ruby>が　<ruby>開<rt>あ</rt></ruby>けて　あります。</p>
  <p id="ch">窗户开着。</p>
  <hr>
  <p>パスポートは　バッグの<ruby>中<rt>なか</rt></ruby>に　<ruby>入<rt>い</rt></ruby>れて　あります。</p>
  <p id="ch">护照在包里放着。</p>
  <hr>
</body>
