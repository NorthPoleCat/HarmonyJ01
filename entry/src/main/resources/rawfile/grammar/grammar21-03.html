<body>
  <h1>[动た形] 後で，～</h1>
  <h2>释义：<span style="color: #e5aa5a">在～之后</span></h2><a style="font-size: 2em" href="../Lessons/Lesson21.html">首次出现于初级上，21课</a>
  <p><span style="color: #e5aa5a;font-weight: 600">备注：</span>也可以使用<span style="color: #e5aa5a;font-weight: 600">"名+の+後で"</span>。</p>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>会社<rt>かいしゃ</rt></ruby>が　<ruby>終<rt>お</rt></ruby>わった　<ruby>後<rt>あと</rt></ruby>で，<ruby>飲<rt>の</rt></ruby>みに　<ruby>行<rt>い</rt></ruby>きます。</p>
  <p id="ch">公司下班后去喝酒。</p>
  <hr>
  <p><ruby>映<rt>えい</rt></ruby><ruby>画<rt>が</rt></ruby>を　<ruby>見<rt>み</rt></ruby>た　<ruby>後<rt>あと</rt></ruby>で，<ruby>食<rt>しょく</rt></ruby><ruby>事<rt>じ</rt></ruby>を　しました。</p>
  <p id="ch">看完电影后吃了饭。</p>
  <hr>
  <p><ruby>仕<rt>し</rt></ruby><ruby>事<rt>ごと</rt></ruby>の　<ruby>後<rt>あと</rt></ruby>で，<ruby>映<rt>えい</rt></ruby><ruby>画<rt>が</rt></ruby>を　<ruby>見<rt>み</rt></ruby>ます。</p>
  <p id="ch">工作之后看电影。</p>
  <hr>
</body>
</html>
