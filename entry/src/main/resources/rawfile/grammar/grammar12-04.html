<body>
  <h1>名の　中で　名が　いちばん 一类形/二类形　です</h1>
  <h2>释义：<span style="color: #e5aa5a">在～中，～最～</span></h2><a style="font-size: 2em" href="../Lessons/Lesson12.html">首次出现于初级上，12课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p>スポーツ　の<ruby>中<rt>なか</rt></ruby>で　サッカーが　いちばん おもしろいです。</p>
  <p id="ch">在各种体育活动中，足球最有意思。</p>
  <hr>
  <p><ruby>日<rt>に</rt></ruby><ruby>本<rt>ほん</rt></ruby><ruby>料<rt>りょう</rt></ruby><ruby>理<rt>り</rt></ruby>　の<ruby>中<rt>なか</rt></ruby>で　<ruby>寿司<rt>すし</rt></ruby>が　いちばん おいしいです。</p>
  <p id="ch">日式饭菜中，寿司最好吃。</p>
  <hr>
  <p><ruby>日<rt>に</rt></ruby><ruby>本<rt>ほん</rt></ruby>で　いちばん <ruby>高<rt>たか</rt></ruby>い　<ruby>山<rt>やま</rt></ruby>は　<ruby>富士<rt>ふじ</rt></ruby><ruby>山<rt>さん</rt></ruby>です。</p>
  <p id="ch">日本最高的山是富士山。</p>
  <hr>
  <p><ruby>1年<rt>いちねん</rt></ruby>で　いちばん <ruby>寒<rt>さむ</rt></ruby>い　<ruby>月<rt>つき</rt></ruby>は　<ruby>２<rt>に</rt></ruby><ruby>月<rt>がつ</rt></ruby>です。</p>
  <p id="ch">一年当中最冷的月份是2月份。</p>
  <hr>
</body>
