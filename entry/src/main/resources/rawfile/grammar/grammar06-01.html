<body>
  <h1>名[场所]へ　动</h1>
  <h2>使用"行きます"，"帰ります"等<span style="color: #e5aa5a">表示移动</span>的动词时，移动的目的地使用助词"へ"，这里<span style="color: #e5aa5a;font-weight: 600">"へ"</span>读作<span style="color: #e5aa5a;font-weight: 600">"え"</span>。</h2><a style="font-size: 2em" href="../Lessons/Lesson06.html">首次出现于初级上，06课</a>
  <p><span style="color: #e5aa5a;font-weight: 600">备注：</span>移动的目的地也可以用助词<span style="color: #e5aa5a;font-weight: 600">"に"</span>表示。</p><a style="font-size: 2em" href="../Lessons/Lesson15.html">首次出现于初级上，15课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>吉<rt>よし</rt></ruby><ruby>田<rt>だ</rt></ruby>さんは　<ruby>中<rt>ちゅう</rt></ruby><ruby>国<rt>ごく</rt></ruby>へ　<ruby>行<rt>い</rt></ruby>きます。</p>
  <p id="ch">吉田先生去中国。</p>
  <hr>
  <p><ruby>森<rt>もり</rt></ruby>さんは　<ruby>日本<rt>にほん</rt></ruby>へ　<ruby>帰<rt>かえ</rt></ruby>ります。</p>
  <p id="ch">森先生回日本。</p>
  <hr>
  <p><ruby>李<rt>り</rt></ruby>さんは　どこへ　<ruby>行<rt>い</rt></ruby>きましたか。</p>
  <p id="ch">小李去哪儿了？</p>
  <hr>
</body>
</html>
