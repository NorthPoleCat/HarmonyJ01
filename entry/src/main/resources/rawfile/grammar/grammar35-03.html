  <h1>名　だけ</h1>
  <h2>释义：表示全部。</h2><a style="font-size:2em" href="../Lessons/Lesson35.html">首次出现于初级下，35课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>今年<rt>ことし</rt></ruby>の<ruby>夏休<rt>なつやす</rt></ruby>みは<ruby>3日<rt>みっか</rt></ruby>だけです。</p>
  <p id="ch">今年的暑假只有三天。</p>
  <hr>
  <p><ruby>森<rt>もり</rt></ruby>さんと<ruby>馬<rt>ば</rt></ruby>さんだけが　お<ruby>酒<rt>さけ</rt></ruby>を<ruby>飲<rt>の</rt></ruby>みます。</p>
  <p id="ch">只有森先生和小马喝酒。</p>
  <hr>
  <p>わたしはその<ruby>料<rt>りょう</rt></ruby><ruby>理<rt>り</rt></ruby>だけを　<ruby>食<rt>た</rt></ruby>べませんでした。</p>
  <p id="ch">我只是没吃那个菜。</p>
  <hr>

　<p><span style="color: #e5aa5a;font-weight: 600">备注：</span>'だけ'后面的助词'が'和'を'有时省略。</p>
　<p style="background:#e4e4e4;">例句：</p>
　<p><ruby>森<rt>もり</rt></ruby>さんと<ruby>馬<rt>ば</rt></ruby>さんだけ　お<ruby>酒<rt>さけ</rt></ruby>を<ruby>飲<rt>の</rt></ruby>みます。</p>
  <p id="ch">只有森先生和小马喝酒。</p>
  <hr>
  <p>わたしはその<ruby>料<rt>りょう</rt></ruby><ruby>理<rt>り</rt></ruby>だけ　<ruby>食<rt>た</rt></ruby>べませんでした。</p>
  <p id="ch">我只是没吃那个菜。</p>
  <hr>

  <h2 style="background:#e4e4e4;">同义句型：</h2>
  <p class="tooltip" grammar="grammar35-04" onclick="grammarClick(this);">名　しか＋否定形式</p></br>
