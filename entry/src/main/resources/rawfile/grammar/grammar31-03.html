<body>
  <h1>小句[简体形]　でしょうか</h1>
  <h2>释义：表示疑问。是礼貌程度较高的表达方式。</h2><a style="font-size:2em" href="../Lessons/Lesson31.html">首次出现于初级下，31课</a>
  <p><span style="color: #e5aa5a;font-weight: 600">备注：</span>如果小句是二类形容词或名词小句，将其简体形的"だ"换成"でしょうか"。</p>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>李<rt>り</rt></ruby>さんは<ruby>来<rt>く</rt></ruby>るでしょうか。</p>
  <p id="ch">小李来吗？</p>
  <hr>
  <p>これは<ruby>中<rt>ちゅう</rt></ruby><ruby>国<rt>ごく</rt></ruby>のお<ruby>菓子<rt>かし</rt></ruby>でしょうか。</p>
  <p id="ch">这是中国的点心吗？</p>
  <hr>
</body>
</html>
