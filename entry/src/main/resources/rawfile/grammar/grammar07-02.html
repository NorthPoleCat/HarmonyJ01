<body>
  <h1>名か 名</h1>
  <h2>对若干名词进行选择时，名词之间使用"か"，相当于汉语中的"或者"。</h2><a style="font-size: 2em" href="../Lessons/Lesson07.html">首次出现于初级上，07课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p>わたしは　<ruby>毎朝<rt>まいあさ</rt></ruby>　パンか　お<ruby>粥<rt>かゆ</rt></ruby>を　<ruby>食<rt>た</rt></ruby>べます。</p>
  <p id="ch">我每天早晨吃面包或稀饭。</p>
  <hr>
  <p><ruby>休<rt>やす</rt></ruby>みは　<ruby>何曜<rt>なんよう</rt></ruby><ruby>日<rt>び</rt></ruby>ですか。</p>
  <p id="ch">你星期几休息？</p>
  <hr>
  <p>ーーー<ruby>休<rt>やす</rt></ruby>みは　<ruby>月曜<rt>げつよう</rt></ruby><ruby>日<rt>び</rt></ruby>か　<ruby>火<rt>か</rt></ruby><ruby>曜<rt>よう</rt></ruby><ruby>日<rt>び</rt></ruby>です。</p>
  <p id="ch">ーーー我星期一或星期二休息。</p>
  <hr>
</body>
