<body>
  <h1>动[て]　しまいます</h1>
  <h2>释义：表示该动作的结果是不愉快的。</h2><a style="font-size:2em" href="../Lessons/Lesson33.html">首次出现于初级下，33课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>森<rt>もり</rt></ruby>さんは　ボーナスを　<ruby>全<rt>ぜん</rt></ruby><ruby>部<rt>ぶ</rt></ruby><ruby>使<rt>つか</rt></ruby>って　しまいました。</p>
  <p id="ch">森先生把奖金全都花光了。</p>
  <hr>
  <p><ruby>大切<rt>たいせつ</rt></ruby>な<ruby>書類<rt>しょるい</rt></ruby>を　うっかり<ruby>忘<rt>わす</rt></ruby>れて　しまいました。</p>
  <p id="ch">把非常重要的文件给忘记了。</p>
  <hr>
  <p><ruby>無理<rt>むり</rt></ruby>をすると，<ruby>病<rt>びょう</rt></ruby><ruby>気<rt>き</rt></ruby>になって　しまいますよ。</p>
  <p id="ch">搞得太累，你要生病的。</p>
  <hr>
  <p><span style="color: #e5aa5a;font-weight: 600">备注：</span>有时也只用来表示动作的<span style="color: #e5aa5a;font-weight: 600">'完成'</span>，而不是结果不愉快。</p>
  <p style="background:#e4e4e4;">例句：</p>
  <p>この<ruby>本<rt>ほん</rt></ruby>はもう<ruby>読<rt>よ</rt></ruby>んで　しまいました。</p>
  <p id="ch">这本书已经全部读完了。</p>
  <hr>
  <p><ruby>最<rt>さい</rt></ruby><ruby>後<rt>ご</rt></ruby>まで<ruby>食<rt>た</rt></ruby>べて　しまいましょう。</p>
  <p id="ch">全都吃掉吧。</p>
  <hr>
</body>
</html>
