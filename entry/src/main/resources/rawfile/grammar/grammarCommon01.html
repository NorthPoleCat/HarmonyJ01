  <h1>动词连用形</h1>
  <h2 style="background:#e4e4e4;">变形规律：动ます形去掉ます</h2>
  <p><span style="font-weight: 600">五段动词</span>：<span style="color: #e5aa5a;font-weight: 600">将结尾的う段假名变为与它同行的い段假名</span></p>
  <p><span style="color: #e5aa5a;font-weight: 600">例</span>：行くー>行き　買うー>買い</p>
  <p><span style="font-weight: 600">一段动词</span>：<span style="color: #e5aa5a;font-weight: 600">去掉词尾的る</span></p>
  <p><span style="color: #e5aa5a;font-weight: 600">例</span>：食べるー>食べ　起きるー>起き</p>
  <p><span style="font-weight: 600">カ变动词</span>：<span style="color: #e5aa5a;font-weight: 600">来るー>き</span></p>
  <p><span style="font-weight: 600">サ变动词</span>：<span style="color: #e5aa5a;font-weight: 600">するー>し</span></p>
  <h2 style="background:#e4e4e4;">使用场景：</h2>
  <p style="color: #e5aa5a;font-weight: 600">转换为名词。</p>

  <p style="color: #e5aa5a;font-weight: 600">转换为定语。</p>
