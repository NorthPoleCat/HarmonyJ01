  <h1>[动た形] ことが　あります</h1>
  <h2>释义：表示过去的经历。</h2><a style="font-size: 2em" href="../Lessons/Lesson21.html">首次出现于初级上，21课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p>わたしは　すき<ruby>焼<rt>や</rt></ruby>きを　<ruby>食<rt>た</rt></ruby>べた　ことが　あります。</p>
  <p id="ch">我吃过日式牛肉火锅。</p>
  <hr>
  <p><ruby>北<rt>ぺ</rt></ruby><ruby>京<rt>キン</rt></ruby>へ　<ruby>行<rt>い</rt></ruby>った　ことが　ありますか。</p>
  <p id="ch">你去过北京吗？</p>
