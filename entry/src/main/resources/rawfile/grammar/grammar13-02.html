<body>
  <h1>名[场所]へ　[动ます形去掉ます]に　行きます・来ます</h1>
  <h2>阐述移动行为的目的的句型。</h2><a style="font-size: 2em" href="../Lessons/Lesson13.html">首次出现于初级上，13课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>午後<rt>ごご</rt></ruby>　<ruby>郵便<rt>ゆうびん</rt></ruby><ruby>局<rt>きょく</rt></ruby>へ　<ruby>荷<rt>に</rt></ruby><ruby>物<rt>もつ</rt></ruby>を　<ruby>出<rt>だ</rt></ruby>しに　<ruby>行<rt>い</rt></ruby>きます。</p>
  <p id="ch">下午去邮局寄包裹。</p>
  <hr>
  <p><ruby>小野<rt>おの</rt></ruby>さんは　プールへ　<ruby>泳<rt>およ</rt></ruby>ぎに　<ruby>行<rt>い</rt></ruby>きます。</p>
  <p id="ch">小野女士去游泳池游泳。</p>
  <hr>
  <p><ruby>李<rt>り</rt></ruby>さんは　わたしの<ruby>家<rt>いえ</rt></ruby>へ　<ruby>遊<rt>あそ</rt></ruby>びに　<ruby>来<rt>き</rt></ruby>ました。</p>
  <p id="ch">小李来我家玩了。</p>
  <hr>
</body>
