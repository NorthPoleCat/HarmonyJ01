  <h1>动[て]　おきます</h1>
  <h2>释义：表示为做某种准备而有意识地进行的动作。有为了某种目的而将动作的结果或效果留存下来的意思。</h2><a style="font-size:2em" href="../Lessons/Lesson34.html">首次出现于初级下，34课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p>お<ruby>客<rt>きゃく</rt></ruby>さんが<ruby>来<rt>く</rt></ruby>る<ruby>前<rt>まえ</rt></ruby>に，<ruby>部屋<rt>へや</rt></ruby>を　<ruby>掃<rt>そう</rt></ruby><ruby>除<rt>じ</rt></ruby>して　おきます。</p>
  <p id="ch">客人来之前把房间打扫好。</p>
  <hr>
  <p><ruby>明日<rt>あした</rt></ruby>は<ruby>忙<rt>いそが</rt></ruby>しいです。<ruby>今<rt>こん</rt></ruby><ruby>夜<rt>や</rt></ruby>はゆっくり　<ruby>休<rt>やす</rt></ruby>んで　おいてください。</p>
  <p id="ch">明天会很忙，今天晚上你要好好休息。</p>
  <hr>
  <p><ruby>訪問<rt>ほうもん</rt></ruby>する<ruby>前<rt>まえ</rt></ruby>に，<ruby>一<rt>いち</rt></ruby><ruby>度<rt>ど</rt></ruby>　<ruby>電<rt>でん</rt></ruby><ruby>話<rt>わ</rt></ruby>して　おきます。</p>
  <p id="ch">拜访之前我准备先打个电话。</p>
  <hr>
</body>
