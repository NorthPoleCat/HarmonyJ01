  <h1>动[て]から　动</h1>
  <h2>表示动作相继发生。</h2><a style="font-size: 2em" href="../Lessons/Lesson14.html">首次出现于初级上，14课</a>
  <p><span style="color: #e5aa5a;font-weight: 600">备注：</span>[て]から不能在一个句子中反复使用两次以上。</p>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>李<rt>り</rt></ruby>さんは　<ruby>毎晩<rt>まいばん</rt></ruby>　ラジオを　<ruby>聞<rt>き</rt></ruby>いてから　<ruby>寝<rt>ね</rt></ruby>ます。</p>
  <p id="ch">小李每晚听了收音机后睡觉。</p>
  <hr>
  <p><ruby>昼<rt>ひろ</rt></ruby>ご<ruby>飯<rt>はん</rt></ruby>を　<ruby>食<rt>た</rt></ruby>べてから　<ruby>出<rt>で</rt></ruby>かけます。</p>
  <p id="ch">吃了午饭后出门。</p>
  <hr>
  <p><ruby>家<rt>いえ</rt></ruby>へ　<ruby>帰<rt>かえ</rt></ruby>ってから，もう　<ruby>一<rt>いち</rt></ruby><ruby>度<rt>ど</rt></ruby>　<ruby>日<rt>に</rt></ruby><ruby>本<rt>ほん</rt></ruby><ruby>語<rt>ご</rt></ruby>の　<ruby>勉<rt>べん</rt></ruby><ruby>強<rt>きょう</rt></ruby>を　します。</p>
  <p id="ch">回家后，再学一遍日语。</p>
  <hr>
</body>
