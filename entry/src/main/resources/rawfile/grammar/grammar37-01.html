<body>
  <h1>ば形</h1>
  <h2>变形规律：</h2>
  <p><span style="font-weight: 600">五段动词</span>：将词尾的<span style="color: #e5aa5a;font-weight: 600">う段假名</span>改为对应的<span style="color: #e5aa5a;font-weight: 600">え段假名</span>，再加上'ば'</p>
  <p>例：買うー>買えば　待つー>待てば　売るー>売れば</p>
  <hr>
  <p><span style="font-weight: 600">一段动词</span>：将词尾的る换成れば</p>
  <p>例：食べるー>食べれば　見るー>見れば</p>
  <hr>
  <p><span style="font-weight: 600">カ变动词</span>：来るー>くれば</p>
  <p><span style="font-weight: 600">サ变动词</span>：するー>すれば</p>
  <hr>
  <p><span style="font-weight: 600">一类形容词・动词ない形</span>：将词尾的い换成ければ</p>
  <p>例：ないー>なければ　楽しいー>楽しければ</p>
  <hr>
