<body>
  <h1>これ/それ/あれ は 名 です</h1>
  <h2>释义：<span style="color: #e5aa5a">这是～/那是～</span></h2><a style="font-size:2em" href="../Lessons/Lesson02.html">首次出现于初级上，02课</a>
  <p><span style="color: #e5aa5a;font-weight: 600">备注：</span>これ/それ/あれ 代表所指的物品距离说话人的距离越来越远。</p>
  <p style="background:#e4e4e4;">例句：</p>
  <p>これは　<ruby>本<rt>ほん</rt></ruby>　です。</p>
  <p id="ch">这是书。</p>
  <hr>
  <p>それは　かばん　です。</p>
  <p id="ch">那是包。</p>
  <hr>
  <p>あれは　テレビ　です。</p>
  <p id="ch">那是电视机。</p>
  <hr>
</body>
</html>
