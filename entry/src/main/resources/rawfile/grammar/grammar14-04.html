<body>
  <h1>动[て] ください</h1>
  <h2>请求某人做某事。</h2><a style="font-size: 2em" href="../Lessons/Lesson14.html">首次出现于初级上，14课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p>ここに　<ruby>住<rt>じゅう</rt></ruby><ruby>所<rt>しょ</rt></ruby>と　<ruby>名<rt>な</rt></ruby><ruby>前<rt>まえ</rt></ruby>を　<ruby>書<rt>か</rt></ruby>いて　ください。</p>
  <p id="ch">请在这里填写住址和姓名。</p>
  <hr>
  <p>この　<ruby>荷<rt>に</rt></ruby><ruby>物<rt>もつ</rt></ruby>を　<ruby>航空便<rt>くうこうびん</rt></ruby>で　<ruby>送<rt>おく</rt></ruby>って　ください。</p>
  <p id="ch">请用航空方式寄这件包裹。</p>
  <hr>
  <h2 style="color: #e5aa5a;">相似句型：</h2>
  <h3 class="tooltip" grammar="grammar07-03" onclick="grammarClick(this);">名を　ください</h3><br>
  <h3 class="tooltip" grammar="grammar19-02" onclick="grammarClick(this);">[动ない]で　ください</h3>
</body>
</html>
