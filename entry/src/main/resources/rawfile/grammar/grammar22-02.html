<body>
    <h1>句けど　句</h1>
    <h2>释义1：表示转折。</h2><a style="font-size: 2em" href="../Lessons/Lesson22.html">首次出现于初级上，22课</a>
    <p style="background:#e4e4e4;">例句：</p>
    <p><ruby>昨日<rt>きのう</rt></ruby>の　<ruby>試<rt>し</rt></ruby><ruby>験<rt>けん</rt></ruby>，どうだった？</p>
    <p id="ch">昨天的考试怎么样？</p>
    <p>ーーちょっと　<ruby>難<rt>むずか</rt></ruby>しかったけど，まあまあ　できたよ。</p>
    <p id="ch">ーー有点难，不过都做出来了。</p>
    <hr>
    <h2>释义2：表示铺垫。</h2><a style="font-size: 2em" href="../Lessons/Lesson22.html">首次出现于初级上，22课</a>
    <p style="background:#e4e4e4;">例句：</p>
    <p><ruby>来<rt>らい</rt></ruby><ruby>週<rt>しゅう</rt></ruby>，<ruby>送別会<rt>そうべつかい</rt></ruby>を　するけど，<ruby>都<rt>つ</rt></ruby><ruby>合<rt>ごう</rt></ruby>は　どうかな？</p>
    <p id="ch">下周要开一个欢送会，你时间方便吗？</p>
    <hr>
    <h2 style="color: #e5aa5a">同义句型：</h2>
    <h3 class="tooltip" grammar="grammar16-03" onclick="grammarClick(this);">句 が 句</h3>
