  <h1>使役被动形式</h1>
  <h2>由使役形式加被动形式构成，一般表示一种被迫性的动作。</h2>
  <hr>
  <h2>变形规律：</h2>
  <p><span style="font-weight: 600">五段动词</span>：将ない形中的'ない'换成'される'</p>
  <p>例：買うー>買わされる　待つー>待たされる　売るー>売らされる</p>
  <hr>
  <p><span style="font-weight: 600">一段动词</span>：将ない形中的'ない'换成'させられる'</p>
  <p>例：食べるー>食べさせられる　見るー>見させられる</p>
  <hr>
  <p><span style="font-weight: 600">カ变动词</span>：来るー>こさせられる</p>
  <p><span style="font-weight: 600">サ变动词</span>：するー>させられる</p>
  <hr>

  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>選手<rt>せんしゅ</rt></ruby>は　<ruby>走<rt>はし</rt></ruby>ります。</p>
  <p id="ch">运动员跑步。</p>
  <hr>
  <p><ruby>監督<rt>かんとく</rt></ruby>は　<ruby>選手<rt>せんしゅ</rt></ruby>を　<ruby>走<rt>はし</rt></ruby>らせます。</p>
  <p id="ch">教练让运动员跑步。</p>
  <hr>
  <p><ruby>選手<rt>せんしゅ</rt></ruby>は　<ruby>監督<rt>かんとく</rt></ruby>に　<ruby>走<rt>はし</rt></ruby>らされます。</p>
  <p id="ch">运动员被教练要求跑步。</p>
