<body>
  <h1>[动ない形去掉ない] なくても　いいです</h1>
  <h2>释义：表示不做某事也可以。</h2><a style="font-size: 2em" href="../Lessons/Lesson19.html">首次出现于初级上，19课</a>
  <p style="background:#e4e4e4;">例句：</p>
  <p><ruby>明日<rt>あした</rt></ruby>は　<ruby>残<rt>ざん</rt></ruby><ruby>業<rt>ぎょう</rt></ruby>し　なくても　いいです。</p>
  <p id="ch">明天不加班也行。</p>
  <hr>
  <p><ruby>慌<rt>あわ</rt></ruby>て　なくても　いいですよ。</p>
  <p id="ch">不要慌慌张张的！</p>
  <hr>
  <p><ruby>靴<rt>くつ</rt></ruby>を　<ruby>脱<rt>ぬ</rt></ruby>が　なくても　いいですか。</p>
  <p id="ch">不脱鞋也可以吗？</p>
  <hr>
  <h2 style="color: #e5aa5a;">相似句型：</h2>
  <h3 class="tooltip" grammar="grammar15-02" onclick="grammarClick(this);">动[て]も　いいです</h3><br>
</body>
</html>
